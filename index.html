<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F0F12" />
  <title>Fitness Check-in · 12-Week Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #0F0F12; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useState, useEffect } = React;

const COLORS = {
  gym: "#C084FC",
  skate: "#F472B6",
  walk: "#34D399",
  rest: "#3A3A42",
  pullup: "#FB923C",
};

const GYM_DAYS = {
  A: { label: "Day A", focus: "Lower Body", color: "#C084FC", exercises: ["Leg Press","Romanian Deadlift","Goblet Squat","Hip Thrust","Leg Curl","Calf Raise"] },
  B: { label: "Day B", focus: "Upper Body", color: "#F472B6", exercises: ["Seated Cable Row","Lat Pulldown","Shoulder Press","Chest Press","Tricep Pushdown","Bicep Curl","Dead Hang","Negative Pull Up"] },
  C: { label: "Day C", focus: "Full Body", color: "#34D399", exercises: ["Dumbbell Lunge","Plank","Cable Glute Kickback","Dumbbell Row","Glute Bridge","Ab Crunch"] },
  none: { label: "Rest", focus: "Recovery", color: "#3A3A42", exercises: [] },
};

const WEEK_START = new Date(2025, 5, 15); // June 15 2025

const DAY_LABELS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getWeekDates(weekIndex) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(WEEK_START);
    d.setDate(WEEK_START.getDate() + weekIndex * 7 + i);
    return d;
  });
}

function fmtDate(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

const PULL_UP_STAGES = [
  { label: "Foundation", sub: "Lat pulldown + cable row", week: "Wk 1–3" },
  { label: "Dead Hangs", sub: "Add dead hangs every session", week: "Wk 2–6" },
  { label: "Negatives", sub: "Lower yourself in 5–8 sec", week: "Wk 3–6" },
  { label: "First Pull Up 🏆", sub: "Attempt unassisted!", week: "Wk 6–12" },
];

const CHECKIN_FIELDS = [
  { key: "energy", label: "Energy this week", type: "rating" },
  { key: "hunger", label: "Hunger / cravings", type: "rating" },
  { key: "sleep", label: "Sleep quality", type: "rating" },
  { key: "win", label: "This week's win 🏅", type: "text", placeholder: "e.g. skated 3× !" },
  { key: "improve", label: "One thing to improve", type: "text", placeholder: "e.g. eat more protein at lunch" },
];

// Default schedule template — user can override per day
const DEFAULT_SCHEDULE = [
  { gymDay: "none", skate: false, walk: true },   // Sun
  { gymDay: "A",    skate: false, walk: false },   // Mon
  { gymDay: "none", skate: false, walk: true },    // Tue
  { gymDay: "B",    skate: false, walk: false },   // Wed
  { gymDay: "none", skate: true,  walk: false },   // Thu
  { gymDay: "C",    skate: false, walk: false },   // Fri
  { gymDay: "none", skate: true,  walk: false },   // Sat
];

function makeWeek(wi) {
  const dates = getWeekDates(wi);
  return {
    weekNum: wi + 1,
    days: DEFAULT_SCHEDULE.map((s, i) => ({
      date: dates[i],
      gymDay: s.gymDay,
      skate: s.skate,
      walk: s.walk,
      completed: false,
      gymDone: {},
      notes: "",
    })),
    checkin: { weightStart: "", weightEnd: "", energy: 0, hunger: 0, sleep: 0, win: "", improve: "" },
    checkinDone: false,
  };
}

// --- persistence (so progress sticks between visits) ---
function loadWeeks() {
  try {
    const raw = localStorage.getItem("fc_weeks");
    if (!raw) return Array.from({ length: 12 }, (_, i) => makeWeek(i));
    const parsed = JSON.parse(raw);
    // re-attach Date objects (JSON turns them into strings)
    parsed.forEach((w, wi) => {
      const dates = getWeekDates(wi);
      w.days.forEach((d, di) => { d.date = dates[di]; });
    });
    return parsed;
  } catch (e) {
    return Array.from({ length: 12 }, (_, i) => makeWeek(i));
  }
}

function loadState(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function RatingInput({ value, onChange }) {
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {[1,2,3,4,5].map(n => (
        <button key={n} onClick={() => onChange(n === value ? 0 : n)} style={{
          width: 32, height: 32, borderRadius: 8,
          border: `1.5px solid ${value >= n ? "#C084FC" : "#2A2A32"}`,
          background: value >= n ? "#C084FC22" : "#1A1A20",
          color: value >= n ? "#C084FC" : "#444",
          fontSize: 14, cursor: "pointer", fontWeight: 600,
        }}>{n}</button>
      ))}
    </div>
  );
}

function ActivityPill({ color, label }) {
  return (
    <span style={{
      fontSize: 9, fontWeight: 700, letterSpacing: "0.06em",
      background: color + "22", color, borderRadius: 4,
      padding: "2px 5px", textTransform: "uppercase", whiteSpace: "nowrap",
    }}>{label}</span>
  );
}

// Day editor bottom sheet — lets user assign gym day / skate / walk
function DayEditor({ day, dayIdx, onUpdate, onClose }) {
  const gymInfo = GYM_DAYS[day.gymDay] || GYM_DAYS.none;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 50,
      background: "rgba(0,0,0,0.7)",
      display: "flex", flexDirection: "column", justifyContent: "flex-end",
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#18181F", borderRadius: "18px 18px 0 0",
        padding: "20px 20px 36px", maxHeight: "80vh", overflowY: "auto",
        maxWidth: 480, margin: "0 auto", width: "100%",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em" }}>
              {DAY_LABELS[day.date.getDay()]} · {fmtDate(day.date)}
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#F1F0EE", marginTop: 2 }}>Edit Day</div>
          </div>
          <button onClick={onClose} style={{
            background: "#2A2A32", border: "none", color: "#888",
            width: 30, height: 30, borderRadius: 8, fontSize: 16, cursor: "pointer",
          }}>×</button>
        </div>

        {/* Gym day picker */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Gym workout</div>
          <div style={{ display: "flex", gap: 8 }}>
            {["none","A","B","C"].map(key => {
              const g = GYM_DAYS[key];
              const active = day.gymDay === key;
              return (
                <button key={key} onClick={() => onUpdate({ gymDay: key })} style={{
                  flex: 1, padding: "10px 4px", borderRadius: 10,
                  border: `1.5px solid ${active ? g.color : "#2A2A32"}`,
                  background: active ? g.color + "20" : "#1A1A20",
                  color: active ? g.color : "#555",
                  cursor: "pointer", fontWeight: 600, fontSize: 11,
                }}>
                  <div>{key === "none" ? "🛌" : key}</div>
                  <div style={{ fontSize: 9, marginTop: 2, opacity: 0.8 }}>{key === "none" ? "Rest" : g.focus}</div>
                </button>
              );
            })}
          </div>
        </div>

        {/* Skate + Walk toggles */}
        <div style={{ marginBottom: 4 }}>
          <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Activities</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[
              { key: "skate", label: "🛼 Skate", color: "#F472B6" },
              { key: "walk",  label: "🚶 Walk",  color: "#34D399" },
            ].map(a => (
              <button key={a.key} onClick={() => onUpdate({ [a.key]: !day[a.key] })} style={{
                flex: 1, padding: "10px", borderRadius: 10,
                border: `1.5px solid ${day[a.key] ? a.color : "#2A2A32"}`,
                background: day[a.key] ? a.color + "20" : "#1A1A20",
                color: day[a.key] ? a.color : "#555",
                cursor: "pointer", fontWeight: 600, fontSize: 12,
              }}>{a.label}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function FitnessCalendar() {
  const [currentWeek, setCurrentWeek] = useState(0);
  const [allWeeks, setAllWeeks] = useState(loadWeeks);
  const [activeView, setActiveView] = useState("calendar");
  const [selectedDay, setSelectedDay] = useState(null);
  const [editingDay, setEditingDay] = useState(null);
  const [pullUpDone, setPullUpDone] = useState(() => loadState("fc_pullup", [false, false, false, false]));

  useEffect(() => { localStorage.setItem("fc_weeks", JSON.stringify(allWeeks)); }, [allWeeks]);
  useEffect(() => { localStorage.setItem("fc_pullup", JSON.stringify(pullUpDone)); }, [pullUpDone]);

  const week = allWeeks[currentWeek];
  const weekDates = getWeekDates(currentWeek);

  const updateDay = (dayIdx, patch) => {
    setAllWeeks(prev => prev.map((w, wi) =>
      wi !== currentWeek ? w : {
        ...w,
        days: w.days.map((d, di) => di !== dayIdx ? d : { ...d, ...patch })
      }
    ));
  };

  const updateCheckin = (field, val) => {
    setAllWeeks(prev => prev.map((w, wi) =>
      wi !== currentWeek ? w : { ...w, checkin: { ...w.checkin, [field]: val } }
    ));
  };

  const saveCheckin = () => {
    setAllWeeks(prev => prev.map((w, wi) =>
      wi !== currentWeek ? w : { ...w, checkinDone: true }
    ));
    setActiveView("calendar");
  };

  const totalGymSessions = week.days.filter(d => d.gymDay !== "none" && d.completed).length;
  const totalSkates = week.days.filter(d => d.skate && d.completed).length;
  const totalWalks = week.days.filter(d => d.walk && d.completed).length;
  const plannedGym = week.days.filter(d => d.gymDay !== "none").length;
  const plannedSkate = week.days.filter(d => d.skate).length;
  const plannedWalk = week.days.filter(d => d.walk).length;

  const dateRange = `${fmtDate(weekDates[0])} – ${fmtDate(weekDates[6])}`;

  return (
    <div style={{
      fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
      background: "#0F0F12", minHeight: "100vh", color: "#F1F0EE",
      maxWidth: 480, margin: "0 auto", position: "relative",
    }}>

      {/* Day editor overlay */}
      {editingDay !== null && (
        <DayEditor
          day={week.days[editingDay]}
          dayIdx={editingDay}
          onUpdate={patch => updateDay(editingDay, patch)}
          onClose={() => setEditingDay(null)}
        />
      )}

      {/* Header */}
      <div style={{
        background: "linear-gradient(135deg, #18181F 0%, #13131A 100%)",
        padding: "24px 20px 16px",
        borderBottom: "1px solid #1E1E28",
        position: "sticky", top: 0, zIndex: 10,
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.15em", color: "#555", textTransform: "uppercase" }}>12-Week Plan</div>
            <h1 style={{ margin: "2px 0 0", fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>
              Week {week.weekNum} <span style={{ color: "#3A3A42", fontWeight: 400, fontSize: 16 }}>/ 12</span>
            </h1>
            <div style={{ fontSize: 11, color: "#555", marginTop: 1 }}>{dateRange}</div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => { setCurrentWeek(w => Math.max(0, w - 1)); setSelectedDay(null); }} style={{
              width: 32, height: 32, borderRadius: 8, border: "1.5px solid #2A2A32",
              background: "#1A1A20", color: "#888", cursor: "pointer", fontSize: 16,
            }}>‹</button>
            <button onClick={() => { setCurrentWeek(w => Math.min(11, w + 1)); setSelectedDay(null); }} style={{
              width: 32, height: 32, borderRadius: 8, border: "1.5px solid #2A2A32",
              background: "#1A1A20", color: "#888", cursor: "pointer", fontSize: 16,
            }}>›</button>
          </div>
        </div>

        <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
          {[
            { key: "calendar", label: "📅 Week" },
            { key: "checkin",  label: "📊 Check-in" },
            { key: "pullup",   label: "💪 Pull Up" },
          ].map(tab => (
            <button key={tab.key} onClick={() => { setActiveView(tab.key); setSelectedDay(null); }} style={{
              flex: 1, padding: "7px 4px", borderRadius: 8, fontSize: 11, fontWeight: 600,
              border: `1.5px solid ${activeView === tab.key ? "#C084FC" : "#2A2A32"}`,
              background: activeView === tab.key ? "#C084FC18" : "#1A1A20",
              color: activeView === tab.key ? "#C084FC" : "#555",
              cursor: "pointer", transition: "all 0.15s",
            }}>{tab.label}</button>
          ))}
        </div>
      </div>

      {/* ── CALENDAR VIEW ── */}
      {activeView === "calendar" && (
        <div style={{ padding: "16px 20px 32px" }}>

          {/* Summary pills */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {[
              { label: "Gym", done: totalGymSessions, total: plannedGym, color: COLORS.gym },
              { label: "Skate", done: totalSkates, total: plannedSkate, color: COLORS.skate },
              { label: "Walk", done: totalWalks, total: plannedWalk, color: COLORS.walk },
            ].map(s => (
              <div key={s.label} style={{
                flex: 1, background: "#1A1A20", borderRadius: 10,
                padding: "10px 8px", border: "1px solid #2A2A32", textAlign: "center",
              }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: s.color }}>
                  {s.done}<span style={{ fontSize: 12, color: "#444" }}>/{s.total}</span>
                </div>
                <div style={{ fontSize: 10, color: "#555", marginTop: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Day rows */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {week.days.map((d, i) => {
              const gymInfo = GYM_DAYS[d.gymDay] || GYM_DAYS.none;
              const isRest = d.gymDay === "none" && !d.skate && !d.walk;
              const isSelected = selectedDay === i;
              const accentColor = d.gymDay !== "none" ? gymInfo.color : d.skate ? COLORS.skate : d.walk ? COLORS.walk : COLORS.rest;

              return (
                <div key={i}>
                  <div style={{
                    background: d.completed ? "#141A14" : "#1A1A20",
                    border: `1.5px solid ${isSelected ? accentColor : d.completed ? "#1A2A1A" : "#1E1E28"}`,
                    borderRadius: isSelected ? "12px 12px 0 0" : 12,
                    padding: "11px 12px",
                    display: "flex", alignItems: "center", gap: 10,
                    transition: "all 0.15s",
                  }}>

                    {/* Date column */}
                    <div style={{ width: 38, flexShrink: 0, textAlign: "center" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#444", textTransform: "uppercase" }}>
                        {DAY_LABELS[d.date.getDay()]}
                      </div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: isSelected ? accentColor : "#777", lineHeight: 1.2 }}>
                        {d.date.getDate()}
                      </div>
                    </div>

                    {/* Activity pills */}
                    <div
                      style={{ flex: 1, display: "flex", flexWrap: "wrap", gap: 4, cursor: "pointer" }}
                      onClick={() => setSelectedDay(isSelected ? null : i)}
                    >
                      {d.gymDay !== "none" && (
                        <ActivityPill color={gymInfo.color} label={`${gymInfo.label} · ${gymInfo.focus}`} />
                      )}
                      {d.skate && <ActivityPill color={COLORS.skate} label="Skate 🛼" />}
                      {d.walk  && <ActivityPill color={COLORS.walk}  label="Walk 🚶" />}
                      {isRest  && <span style={{ fontSize: 11, color: "#333" }}>Rest day</span>}
                    </div>

                    {/* Edit button */}
                    <button
                      onClick={e => { e.stopPropagation(); setEditingDay(i); }}
                      style={{
                        width: 26, height: 26, borderRadius: 6, flexShrink: 0,
                        border: "1px solid #2A2A32", background: "#1E1E28",
                        color: "#555", cursor: "pointer", fontSize: 12,
                      }}
                      title="Edit day"
                    >✎</button>

                    {/* Complete dot */}
                    <div
                      onClick={e => { e.stopPropagation(); updateDay(i, { completed: !d.completed }); }}
                      style={{
                        width: 22, height: 22, borderRadius: "50%", flexShrink: 0,
                        border: `2px solid ${d.completed ? "#34D399" : "#2A2A32"}`,
                        background: d.completed ? "#34D39920" : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 10, color: "#34D399", cursor: "pointer",
                      }}
                    >{d.completed ? "✓" : ""}</div>
                  </div>

                  {/* Expanded */}
                  {isSelected && (
                    <div style={{
                      background: "#131318",
                      border: `1.5px solid ${accentColor}`,
                      borderTop: "none",
                      borderRadius: "0 0 12px 12px",
                      padding: "14px 14px 16px",
                    }}>

                      {/* Gym exercises */}
                      {d.gymDay !== "none" && gymInfo.exercises.length > 0 && (
                        <div style={{ marginBottom: 12 }}>
                          <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8 }}>
                            {gymInfo.label} — {gymInfo.focus}
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                            {gymInfo.exercises.map((ex, ei) => {
                              const exDone = d.gymDone?.[ei] || false;
                              const isPullUp = ex === "Dead Hang" || ex === "Negative Pull Up";
                              return (
                                <div key={ei}
                                  onClick={() => updateDay(i, { gymDone: { ...d.gymDone, [ei]: !exDone } })}
                                  style={{
                                    display: "flex", alignItems: "center", gap: 10,
                                    padding: "8px 10px", borderRadius: 8,
                                    background: exDone ? "#1A2A1A" : "#1A1A22",
                                    border: `1px solid ${exDone ? "#34D39930" : "#2A2A32"}`,
                                    cursor: "pointer", opacity: exDone ? 0.55 : 1,
                                    transition: "all 0.1s",
                                  }}
                                >
                                  <div style={{
                                    width: 18, height: 18, borderRadius: 5, flexShrink: 0,
                                    border: `1.5px solid ${exDone ? "#34D399" : "#3A3A42"}`,
                                    background: exDone ? "#34D399" : "transparent",
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    fontSize: 9, color: "#fff",
                                  }}>{exDone ? "✓" : ""}</div>
                                  <span style={{ fontSize: 12, color: exDone ? "#555" : "#DDD", flex: 1 }}>{ex}</span>
                                  {isPullUp && (
                                    <span style={{ fontSize: 9, color: COLORS.pullup, fontWeight: 700 }}>PULL UP</span>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* Skate / Walk indicators */}
                      {(d.skate || d.walk) && (
                        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                          {d.skate && (
                            <div style={{
                              flex: 1, padding: "8px", borderRadius: 8, textAlign: "center",
                              background: "#1A1420", border: "1px solid #F472B630", fontSize: 12, color: "#F472B6",
                            }}>🛼 Skate session</div>
                          )}
                          {d.walk && (
                            <div style={{
                              flex: 1, padding: "8px", borderRadius: 8, textAlign: "center",
                              background: "#141A14", border: "1px solid #34D39930", fontSize: 12, color: "#34D399",
                            }}>🚶 Walk</div>
                          )}
                        </div>
                      )}

                      {/* Notes */}
                      <textarea
                        placeholder="How did it feel? What did you eat? Any notes..."
                        value={d.notes}
                        onChange={e => updateDay(i, { notes: e.target.value })}
                        onClick={e => e.stopPropagation()}
                        style={{
                          width: "100%", minHeight: 52, background: "#1A1A20",
                          border: "1px solid #2A2A32", borderRadius: 8,
                          color: "#AAA", fontSize: 12, padding: "8px 10px",
                          resize: "none", outline: "none", boxSizing: "border-box",
                          fontFamily: "inherit", lineHeight: 1.5,
                        }}
                      />

                      <button
                        onClick={() => updateDay(i, { completed: !d.completed })}
                        style={{
                          width: "100%", marginTop: 10, padding: "10px",
                          borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                          border: `1.5px solid ${d.completed ? "#34D399" : "#3A3A42"}`,
                          background: d.completed ? "#34D39920" : "#1E1E28",
                          color: d.completed ? "#34D399" : "#666",
                          transition: "all 0.15s",
                        }}
                      >
                        {d.completed ? "✓ Day Complete!" : "Mark Day Complete"}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Progress bar */}
          <div style={{ marginTop: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
              <span style={{ fontSize: 10, color: "#444", textTransform: "uppercase", letterSpacing: "0.08em" }}>Week completion</span>
              <span style={{ fontSize: 11, color: "#C084FC", fontWeight: 600 }}>
                {week.days.filter(d => d.completed).length}/7
              </span>
            </div>
            <div style={{ height: 4, background: "#1E1E28", borderRadius: 2 }}>
              <div style={{
                height: "100%", borderRadius: 2,
                background: "linear-gradient(90deg, #C084FC, #F472B6)",
                width: `${(week.days.filter(d => d.completed).length / 7) * 100}%`,
                transition: "width 0.4s ease",
              }} />
            </div>
          </div>
        </div>
      )}

      {/* ── CHECK-IN VIEW ── */}
      {activeView === "checkin" && (
        <div style={{ padding: "16px 20px 32px" }}>
          <div style={{ fontSize: 13, color: "#666", lineHeight: 1.6, marginBottom: 16 }}>
            Week {week.weekNum} check-in · <span style={{ color: "#C084FC" }}>{dateRange}</span>
          </div>

          {/* Weight trend */}
          {allWeeks.some(w => w.checkin.weightEnd) && (
            <div style={{ background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 12, padding: "12px 14px", marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>Weight trend (end of week)</div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 52 }}>
                {allWeeks.slice(0, currentWeek + 1).map((w, i) => {
                  const weights = allWeeks.filter(x => x.checkin.weightEnd).map(x => parseFloat(x.checkin.weightEnd));
                  const maxW = Math.max(...weights, 70);
                  const minW = Math.min(...weights, 58);
                  const range = maxW - minW || 1;
                  const h = w.checkin.weightEnd ? Math.max(6, ((maxW - parseFloat(w.checkin.weightEnd)) / range) * 40 + 6) : 6;
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                      <div style={{
                        width: "100%", height: h, borderRadius: 3,
                        background: i === currentWeek ? "#C084FC" : w.checkin.weightEnd ? "#3A3A52" : "#1E1E28",
                      }} />
                      {w.checkin.weightEnd && (
                        <div style={{ fontSize: 7, color: "#444" }}>{w.checkin.weightEnd}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Weekly weight card */}
          <div style={{ background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 12, padding: "14px", marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: "#888", fontWeight: 500, marginBottom: 12 }}>⚖️ Weekly Weight</div>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              {/* Day 1 weight */}
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: "#555", marginBottom: 5 }}>
                  Day 1 · {fmtDate(weekDates[0])}
                </div>
                <input
                  type="number"
                  placeholder="e.g. 69.0"
                  value={week.checkin.weightStart}
                  onChange={e => updateCheckin("weightStart", e.target.value)}
                  style={{
                    width: "100%", background: "#13131A", border: "1px solid #2A2A32",
                    borderRadius: 8, color: "#DDD", fontSize: 14, padding: "9px 10px",
                    outline: "none", boxSizing: "border-box", fontFamily: "inherit", fontWeight: 600,
                  }}
                />
                <div style={{ fontSize: 9, color: "#444", marginTop: 4 }}>kg · start of week</div>
              </div>

              {/* Arrow + diff */}
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 22 }}>
                {(() => {
                  const s = parseFloat(week.checkin.weightStart);
                  const e = parseFloat(week.checkin.weightEnd);
                  const diff = (!isNaN(s) && !isNaN(e) && week.checkin.weightStart && week.checkin.weightEnd) ? (e - s).toFixed(1) : null;
                  return diff !== null ? (
                    <div style={{
                      fontSize: 12, fontWeight: 700,
                      color: parseFloat(diff) < 0 ? "#34D399" : parseFloat(diff) > 0 ? "#F87171" : "#888",
                      background: parseFloat(diff) < 0 ? "#34D39915" : parseFloat(diff) > 0 ? "#F8717115" : "#2A2A32",
                      border: `1px solid ${parseFloat(diff) < 0 ? "#34D39940" : parseFloat(diff) > 0 ? "#F8717140" : "#3A3A42"}`,
                      borderRadius: 8, padding: "6px 8px", textAlign: "center", whiteSpace: "nowrap",
                    }}>
                      {parseFloat(diff) > 0 ? "+" : ""}{diff} kg
                    </div>
                  ) : (
                    <div style={{ fontSize: 16, color: "#2A2A32" }}>→</div>
                  );
                })()}
              </div>

              {/* Day 7 weight */}
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10, color: "#555", marginBottom: 5 }}>
                  Day 7 · {fmtDate(weekDates[6])}
                </div>
                <input
                  type="number"
                  placeholder="e.g. 68.4"
                  value={week.checkin.weightEnd}
                  onChange={e => updateCheckin("weightEnd", e.target.value)}
                  style={{
                    width: "100%", background: "#13131A", border: "1px solid #2A2A32",
                    borderRadius: 8, color: "#DDD", fontSize: 14, padding: "9px 10px",
                    outline: "none", boxSizing: "border-box", fontFamily: "inherit", fontWeight: 600,
                  }}
                />
                <div style={{ fontSize: 9, color: "#444", marginTop: 4 }}>kg · end of week</div>
              </div>
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {CHECKIN_FIELDS.map(field => (
              <div key={field.key} style={{ background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 12, padding: "13px 14px" }}>
                <div style={{ fontSize: 11, color: "#888", marginBottom: 8, fontWeight: 500 }}>{field.label}</div>
                {field.type === "rating" ? (
                  <RatingInput value={week.checkin[field.key]} onChange={v => updateCheckin(field.key, v)} />
                ) : (
                  <input
                    type={field.type}
                    placeholder={field.placeholder}
                    value={week.checkin[field.key]}
                    onChange={e => updateCheckin(field.key, e.target.value)}
                    style={{
                      width: "100%", background: "#13131A", border: "1px solid #2A2A32",
                      borderRadius: 8, color: "#DDD", fontSize: 13, padding: "8px 10px",
                      outline: "none", boxSizing: "border-box", fontFamily: "inherit",
                    }}
                  />
                )}
              </div>
            ))}
          </div>

          <button onClick={saveCheckin} style={{
            width: "100%", marginTop: 16, padding: "13px",
            borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer",
            border: "none", background: "linear-gradient(135deg, #C084FC, #F472B6)",
            color: "#fff", letterSpacing: "0.02em",
          }}>
            Save Week {week.weekNum} Check-in ✓
          </button>

          {allWeeks.some((w, i) => i < currentWeek && w.checkinDone) && (
            <div style={{ marginTop: 20 }}>
              <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>Past check-ins</div>
              {allWeeks.map((w, i) => i < currentWeek && w.checkinDone ? (
                <div key={i} style={{
                  background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 10,
                  padding: "10px 14px", marginBottom: 8,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: "#888", fontWeight: 600 }}>
                      Week {w.weekNum} · {fmtDate(getWeekDates(i)[0])}
                    </span>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      {w.checkin.weightStart && (
                        <span style={{ fontSize: 12, color: "#555" }}>{w.checkin.weightStart}</span>
                      )}
                      {w.checkin.weightStart && w.checkin.weightEnd && (
                        <span style={{ fontSize: 10, color: "#444" }}>→</span>
                      )}
                      {w.checkin.weightEnd && (
                        <span style={{ fontSize: 13, color: "#C084FC", fontWeight: 700 }}>{w.checkin.weightEnd} kg</span>
                      )}
                      {w.checkin.weightStart && w.checkin.weightEnd && (() => {
                        const diff = (parseFloat(w.checkin.weightEnd) - parseFloat(w.checkin.weightStart)).toFixed(1);
                        return (
                          <span style={{
                            fontSize: 11, fontWeight: 700,
                            color: parseFloat(diff) < 0 ? "#34D399" : parseFloat(diff) > 0 ? "#F87171" : "#888",
                          }}>
                            ({parseFloat(diff) > 0 ? "+" : ""}{diff})
                          </span>
                        );
                      })()}
                    </div>
                  </div>
                  {w.checkin.win && <div style={{ fontSize: 11, color: "#555", marginTop: 4 }}>🏅 {w.checkin.win}</div>}
                </div>
              ) : null)}
            </div>
          )}
        </div>
      )}

      {/* ── PULL UP TRACKER ── */}
      {activeView === "pullup" && (
        <div style={{ padding: "16px 20px 32px" }}>
          <div style={{ fontSize: 13, color: "#666", lineHeight: 1.6, marginBottom: 16 }}>
            Your pull up journey. Tap each stage when you've reached it. Typically <span style={{ color: COLORS.pullup }}>8–12 weeks</span>.
          </div>

          <div style={{
            background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 14,
            padding: "20px", marginBottom: 16, textAlign: "center",
          }}>
            <div style={{ fontSize: 40, marginBottom: 4 }}>
              {pullUpDone[3] ? "🏆" : pullUpDone[2] ? "💪" : pullUpDone[1] ? "🔥" : pullUpDone[0] ? "⚡" : "🎯"}
            </div>
            <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.pullup }}>
              {pullUpDone.filter(Boolean).length}<span style={{ fontSize: 14, color: "#444", fontWeight: 400 }}>/4</span>
            </div>
            <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>stages unlocked</div>
            <div style={{ height: 5, background: "#2A2A32", borderRadius: 3, marginTop: 14 }}>
              <div style={{
                height: "100%", borderRadius: 3,
                background: `linear-gradient(90deg, ${COLORS.pullup}, #FBBF24)`,
                width: `${(pullUpDone.filter(Boolean).length / 4) * 100}%`,
                transition: "width 0.4s ease",
              }} />
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {PULL_UP_STAGES.map((stage, i) => {
              const done = pullUpDone[i];
              const locked = i > 0 && !pullUpDone[i - 1];
              return (
                <div key={i}
                  onClick={() => !locked && setPullUpDone(prev => { const n = [...prev]; n[i] = !n[i]; return n; })}
                  style={{
                    background: done ? "#1A1810" : locked ? "#141418" : "#1A1A20",
                    border: `1.5px solid ${done ? COLORS.pullup + "60" : locked ? "#1E1E22" : "#2A2A32"}`,
                    borderRadius: 12, padding: "14px 16px",
                    cursor: locked ? "default" : "pointer", opacity: locked ? 0.4 : 1,
                    display: "flex", alignItems: "center", gap: 12, transition: "all 0.15s",
                  }}
                >
                  <div style={{
                    width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                    border: `2px solid ${done ? COLORS.pullup : locked ? "#2A2A32" : "#3A3A42"}`,
                    background: done ? COLORS.pullup + "20" : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: done ? 16 : 14, color: done ? COLORS.pullup : "#444",
                  }}>
                    {done ? "✓" : ["🪨","🧗","⬆️","🏆"][i]}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: done ? COLORS.pullup : locked ? "#444" : "#F1F0EE" }}>
                      {stage.label}
                    </div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{stage.week} · {stage.sub}</div>
                  </div>
                  {locked && <span style={{ fontSize: 11, color: "#333" }}>🔒</span>}
                </div>
              );
            })}
          </div>

          <div style={{ marginTop: 16, background: "#1A1A20", border: "1px solid #2A2A32", borderRadius: 12, padding: "14px 16px" }}>
            <div style={{ fontSize: 10, color: COLORS.pullup, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 8 }}>Remember</div>
            <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7 }}>
              • Dead hangs + negatives are on every <span style={{ color: "#F472B6" }}>Day B</span> workout<br />
              • Lat pulldown is your #1 pull up builder — pull to chest, slow up<br />
              • One day it just clicks — trust the process 💜
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FitnessCalendar />);
  </script>
</body>
</html>

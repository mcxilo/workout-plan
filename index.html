function getWeekDates(wi) {
  return Array.from({ length:7 }, (_,i) => {
    const d = new Date(WEEK_START);
    d.setDate(WEEK_START.getDate() + wi*7 + i);
    return d;
  });
}

function makeWeek(wi) {
  const dates = getWeekDates(wi);
  return {
    weekNum: wi+1,
    days: DEFAULT_SCHEDULE.map((s,i) => ({
      date:dates[i], gymDay:s.gymDay||"none", skate:!!s.skate,
      completed:false, gymDone:{}, notes:"", motivation:"", weight:"",
      gymEffort:"", skateEffort:"", walkEffort:"",
      walkSteps:"", skateMinutes:"", skateCalories:"",
      energy:0, stress:0, moodStability:0, cravings:0,
    })),
    checkin:{ waist:"", win:"", improve:"" },
    checkinDone:false,
  };
}

/* ── condition functions ── */
function getWalkCondition(steps, effort) {
  const s = parseInt(steps);
  if (!steps||isNaN(s)||s<=0) return null;
  if (effort==="full") {
    if (s<4500)  return { label:"Walking Like You Meant It ⚡",  emoji:"⚡", color:"#3FAFC4", tip:"Short but intentional — quality over quantity today 💙" };
    if (s<7000)  return { label:"Power Walking Energy! 💪🏻",     emoji:"💪", color:"#5FB84B", tip:"You turned a stroll into a workout — full effort shows 💚" };
    if (s<10000) return { label:"Brisk & Purposeful 🔥",         emoji:"✨", color:"#EE6A4C", tip:"You walked like you had somewhere important to be 🔥" };
    return         { label:"Full Power, Full Distance 👑",        emoji:"🏅", color:"#E0B72E", tip:"Full power, full distance — elite behaviour 👑" };
  }
  if (effort==="medium") {
    if (s<4500)  return { label:"Short & Sweet 🌸",              emoji:"🌸", color:"#3FAFC4", tip:"Short and sweet — still counts 💙" };
    if (s<7000)  return { label:"Moving and Shining! ✨",         emoji:"🌿", color:"#5FB84B", tip:"Small steps, big energy 💚" };
    if (s<10000) return { label:"She's That Girl 🌀",            emoji:"✨", color:"#EE6A4C", tip:"She's walking, she's glowing, she's that girl 🔥" };
    return         { label:"10k Steady 🏅",                      emoji:"⭐", color:"#E0B72E", tip:"10k steps at a steady pace — real achievement 🏅" };
  }
  if (effort==="slow") {
    if (s<4500)  return { label:"Gentle Wander 🌙",              emoji:"🌙", color:"#3FAFC4", tip:"Sometimes the soul needs a slow one 💙" };
    if (s<7000)  return { label:"Easy Stroll 🌿",                emoji:"🌿", color:"#5FB84B", tip:"Easy stroll, decent distance — that's what matters 💚" };
    if (s<10000) return { label:"Long & Easy 🌿",                emoji:"💚", color:"#5FB84B", tip:"Hours on your feet at a gentle pace 🌿" };
    return         { label:"10k on Slow Burn 🌟",                emoji:"🌟", color:"#E0B72E", tip:"10k at a gentle pace — underrated but incredible 🌟" };
  }
  if (s<4500)  return { label:"Baby Steps, Still Steps! 🐣", emoji:"🐾", color:"#3FAFC4", tip:"Every little loop adds up 💙" };
  if (s<7000)  return { label:"Actually Moving Today! 🌿",   emoji:"🌿", color:"#5FB84B", tip:"You showed up and that's everything 💚" };
  if (s<10000) return { label:"Walking With Purpose! ✨",     emoji:"✨", color:"#EE6A4C", tip:"That girl behaviour 🔥" };
  return         { label:"Superstar Walker! 🏅",              emoji:"⭐", color:"#E0B72E", tip:"10k+ steps?! Elite behaviour 👑" };
}

function getSkateCondition(cal, min, effort) {
  const c = parseInt(cal), m = parseInt(min);
  const hasC = cal&&!isNaN(c)&&c>0, hasM = min&&!isNaN(m)&&m>0;
  if (!hasC&&!hasM) return null;
  const size = hasC
    ? (c<250?"low":c<450?"medium":"high")
    : (m<30?"low":m<55?"medium":"high");
  const stats = hasM&&hasC ? `${m} min, ${c} kcal` : hasM ? `${m} min` : `${c} kcal`;
  if (effort==="full") {
    if (size==="low")    return { label:"All Gas, Short Session ⚡",   emoji:"⚡", color:"#3FAFC4", tip:`${stats} — burned bright and fast, all in on a short one 💙` };
    if (size==="medium") return { label:"Commitment On Wheels ⚡",     emoji:"💪", color:"#EE6A4C", tip:`${stats} — maximum energy, real distance. This is what commitment looks like ⚡` };
    return                 { label:"Elite Skater Mode 🚀",             emoji:"🚀", color:"#EE6A4C", tip:`${stats} — full power, long session. You're an athlete 🚀` };
  }
  if (effort==="medium") {
    if (size==="low")    return { label:"Easy Warmup Skate 🌊",        emoji:"🌊", color:"#3FAFC4", tip:`${stats} — wheels turning, easy warmup 💙` };
    if (size==="medium") return { label:"Smooth Operator 💨",          emoji:"💨", color:"#5FB84B", tip:`${stats} — smooth and steady, your bread and butter 💚` };
    return                 { label:"Long & Steady 🌊",                 emoji:"🌊", color:"#5FB84B", tip:`${stats} — kept going when most would've stopped 🌊` };
  }
  if (effort==="slow") {
    if (size==="low")    return { label:"Breezy Recovery Glide 🌸",    emoji:"🌸", color:"#3FAFC4", tip:`${stats} — easy does it, joints grateful 💙` };
    if (size==="medium") return { label:"Gentle Pace, Real Time 💙",   emoji:"💙", color:"#5FB84B", tip:`${stats} — body was working even when it didn't feel like it 💙` };
    return                 { label:"Patience & Persistence 🌿",        emoji:"🌿", color:"#5FB84B", tip:`${stats} — stayed out there, exactly the right approach 🌿` };
  }
  if (size==="low")    return { label:"Breezy Glide 🌊",   emoji:"🌊", color:"#3FAFC4", tip:`${stats} — easy cruise, joints are grateful 💙` };
  if (size==="medium") return { label:"Smooth Operator 💨", emoji:"💨", color:"#5FB84B", tip:`${stats} — solid session, wheels turning 💚` };
  return                  { label:"Full Send! 🚀",            emoji:"🚀", color:"#EE6A4C", tip:`${stats} — elite session, keeping up with runners 👟✨` };
}

function getGymCondition(done, total, effort) {
  if (!total||done===0) return null;
  const ratio = done/total;
  const size = ratio<=0.4?"low":ratio<=0.7?"medium":"high";
  const isAll = done===total;
  if (effort==="full") {
    if (size==="low")    return { label:"Left It All On The Floor 🔥",      emoji:"🔥", color:"#EE6A4C", tip:`${done}/${total} — your body hit its limit and that's valid 💪` };
    if (size==="medium") return { label:"Pushed Hard, Got Halfway 💪🏻",     emoji:"💪", color:"#8BB83A", tip:`${done}/${total} — full effort, real results 💜` };
    return                 { label:"Beast Mode Activated 👑",               emoji:"👑", color:"#E0B72E", tip:`${done}/${total} — unstoppable today 🏆` };
  }
  if (effort==="medium") {
    if (size==="low")    return { label:"Showed Up & Did What You Could 🌸", emoji:"🌸", color:"#3FAFC4", tip:`${done}/${total} — some days that's the win 💙` };
    if (size==="medium") return { label:"Solid Middle Ground ✨",            emoji:"✨", color:"#5FB84B", tip:`${done}/${total} — steady effort, steady progress 💚` };
    return                 { label:"Consistent Icon Behaviour 👑",          emoji:"✨", color:"#E0B72E", tip:`${done}/${total} — energy managed well, consistent icon behaviour 👑` };
  }
  if (effort==="slow") {
    if (size==="low")    return { label:"Don't Underestimate This 🤍",      emoji:"🌱", color:"#3FAFC4", tip:`${done}/${total} — showing up on a slow day takes effort too 🤍` };
    if (size==="medium") return { label:"Half The Session, All The Heart 🌸",emoji:"🌸", color:"#8BB83A", tip:`${done}/${total} — taking it easy is also a strategy 🌸` };
    return                 { label:"Full Session On A Slow Day 🌱",         emoji:"🌿", color:"#5FB84B", tip:`${done}/${total} — quiet consistency adds up 💚` };
  }
  if (ratio<=0.4)  return { label:"Showed Up & That's Enough 💛", emoji:"🌱", color:"#3FAFC4", tip:`${done}/${total} — showing up IS the workout!` };
  if (ratio<=0.7)  return { label:"Halfway Hero! 🌸",             emoji:"🌸", color:"#8BB83A", tip:`${done}/${total} — real work today!` };
  if (!isAll)      return { label:"Almost There, Champ! 🔥",      emoji:"🔥", color:"#EE6A4C", tip:`${done}/${total} — so close to a full session!` };
  return             { label:"Full Gym Session! ⭐",               emoji:"👑", color:"#E0B72E", tip:`${done}/${total} — you smashed it! 💪` };
}

function getWeekCondition(g, sk, w) {
  const t = g+sk+w;
  if (t===0) return null;
  if (w>=3&&g>=3&&sk>=2) return { label:"Unstoppable Week! 🏆", color:"#E0B72E" };
  if (w>=2&&g>=2&&sk>=1) return { label:"Solid Week 🔥",        color:"#EE6A4C" };
  if (t>=3)               return { label:"Good Effort 🌸",       color:"#8BB83A" };
  return                    { label:"Getting Going 🌱",           color:"#3FAFC4" };
}

function getMotivationCondition(emojis) {
  const valid = emojis.filter(Boolean);
  if (valid.length===0) return null;
  const scores = valid.map(e=>MOTIVATION_EMOJIS.find(m=>m.key===e)?.score||0);
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  if (avg<=1.5) return { label:"Tough week mentally — that's real and it's okay 🤍",       color:"#3FAFC4" };
  if (avg<=2.5) return { label:"Mostly low energy this week — rest was probably needed 🌙", color:"#8BB83A" };
  if (avg<=3.5) return { label:"Up and down week — very normal, you still showed up 🌸",   color:"#5FB84B" };
  if (avg<=4.5) return { label:"Strong motivation week — you really wanted it 💪🏻",         color:"#EE6A4C" };
  return          { label:"You were locked in this week — this energy is everything 👑",    color:"#E0B72E" };
}

function ConditionBadge({ condition, t }) {
  if (!condition) return null;
  return (
    <div style={{ marginTop:8,padding:"8px 10px",borderRadius:8,
      background:condition.color+"15",border:`1px solid ${condition.color}40`,
      display:"flex",alignItems:"flex-start",gap:8 }}>
      <span style={{ fontSize:16,flexShrink:0 }}>{condition.emoji}</span>
      <div>
        <div style={{ fontSize:11,fontWeight:700,color:condition.color }}>{condition.label}</div>
        {condition.tip&&<div style={{ fontSize:10,color:t.textMuted,marginTop:2,lineHeight:1.4 }}>{condition.tip}</div>}
      </div>
    </div>
  );
}

function WeightGraph({ allWeeks, t }) {
  const points = [];
  allWeeks.forEach((w,wi)=>{
    w.days.forEach((d,di)=>{
      if (d.weight) points.push({ idx: wi*7+di, v: parseFloat(d.weight), wi, di });
    });
  });
  if (points.length===0) return <div style={{ textAlign:"center",color:t.textFaint,fontSize:12,padding:"24px 0" }}>No weight data yet — log it daily!</div>;
  const totalDays = TOTAL_WEEKS*7;
  const vals=points.map(p=>p.v);
  const minV=Math.min(...vals,58)-1,maxV=Math.max(...vals,70)+1,range=maxV-minV;
  const W=320,H=110,P={t:10,b:18,l:30,r:14};
  const gW=W-P.l-P.r,gH=H-P.t-P.b;
  const xOf=idx=>P.l+(idx/(totalDays-1))*gW;
  const yOf=v=>P.t+(1-(v-minV)/range)*gH;
  const lineStr=points.map(p=>`${xOf(p.idx)},${yOf(p.v)}`).join(" ");
  const tY=yOf(58);
  const yTicks=Array.from({length:3},(_,i)=>Math.round(minV+(range/2)*i));
  const labelEvery = Math.max(1, Math.round(TOTAL_WEEKS/5));
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible" }}>
      {yTicks.map(v=>(
        <g key={v}>
          <line x1={P.l} y1={yOf(v)} x2={W-P.r} y2={yOf(v)} stroke={t.divider} strokeWidth="1"/>
          <text x={P.l-4} y={yOf(v)+3} fill={t.textFaint} fontSize="7" textAnchor="end">{v}</text>
        </g>
      ))}
      {58>=minV&&58<=maxV&&<>
        <line x1={P.l} y1={tY} x2={W-P.r} y2={tY} stroke="#5FB84B" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>
        <text x={W-P.r+2} y={tY+3} fill="#5FB84B" fontSize="7">58</text>
      </>}
      {points.length>1&&<polyline points={lineStr} fill="none" stroke={COLORS.accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
      {points.length===1&&<circle cx={xOf(points[0].idx)} cy={yOf(points[0].v)} r="3" fill={COLORS.accent}/>}
      {Array.from({length:TOTAL_WEEKS},(_,wi)=>wi).filter(wi=>wi%labelEvery===0).map(wi=>(
        <text key={wi} x={xOf(wi*7)} y={H-P.b+10} fill={t.textFaint} fontSize="7" textAnchor="middle">W{wi+1}</text>
      ))}
      {points.length>0&&(()=>{
        const last=points[points.length-1];
        const lx=xOf(last.idx), ly=yOf(last.v);
        const labelRight = lx < W*0.75;
        return (
          <g>
            <circle cx={lx} cy={ly} r="4.5" fill={COLORS.accent} stroke={t.card} strokeWidth="2"/>
            <circle cx={lx} cy={ly} r="8" fill="none" stroke={COLORS.accent} strokeWidth="1" opacity="0.4"/>
            <rect x={labelRight?lx+8:lx-58} y={ly-19} width={50} height={16} rx={5} fill={t.card} stroke={COLORS.accent} strokeOpacity="0.4" strokeWidth="1"/>
            <text x={labelRight?lx+33:lx-33} y={ly-8} fill={COLORS.accent} fontSize="9" fontWeight="700" textAnchor="middle">{last.v}kg</text>
          </g>
        );
      })()}
    </svg>
  );
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportWeek(w, weekDates) {
  const lines = [];
  lines.push(`WEEK ${w.weekNum} — ${fmtDate(weekDates[0])} to ${fmtDate(weekDates[6])}`);
  lines.push("=".repeat(40));
  lines.push("");
  const wLogged = w.days.filter(d=>d.weight);
  if (wLogged.length>0) {
    lines.push(`Weight: ${wLogged.map(d=>`${d.weight}kg`).join(" → ")}`);
    if (wLogged.length>1) {
      const diff=(parseFloat(wLogged[wLogged.length-1].weight)-parseFloat(wLogged[0].weight)).toFixed(1);
      lines.push(`Change: ${diff>0?"+":""}${diff} kg`);
    }
  } else {
    lines.push(`Weight: not logged`);
  }
  lines.push(`Waist: ${w.checkin.waist||"-"} cm`);
  lines.push("");
  lines.push("DAILY LOG");
  lines.push("-".repeat(40));
  w.days.forEach((d,i)=>{
    lines.push(`${DAY_LABELS[i]} ${fmtDate(d.date)}:`);
    const gymInfo=GYM_DAYS[d.gymDay]||GYM_DAYS.none;
    if (d.weight) lines.push(`  Weight: ${d.weight} kg`);
    if (d.gymDay!=="none") {
      const gymDone=Object.values(d.gymDone||{}).filter(Boolean).length;
      lines.push(`  Gym (${gymInfo.label}): ${gymDone}/${gymInfo.exercises.length} exercises, effort: ${d.gymEffort||"-"}`);
    }
    if (d.skate) lines.push(`  Skate: ${d.skateMinutes||"-"} min, ${d.skateCalories||"-"} kcal, effort: ${d.skateEffort||"-"}`);
    if (d.walkSteps) lines.push(`  Walk: ${d.walkSteps} steps, effort: ${d.walkEffort||"-"}`);
    if (d.motivation) lines.push(`  Motivation: ${d.motivation}`);
    if (d.energy||d.stress||d.moodStability||d.cravings) lines.push(`  Feelings: Energy ${d.energy||"-"}/5, Stress ${d.stress||"-"}/5, Mood ${d.moodStability||"-"}/5, Cravings ${d.cravings||"-"}/5`);
    if (d.notes) lines.push(`  Notes: ${d.notes}`);
    lines.push(`  Completed: ${d.completed?"Yes":"No"}`);
    lines.push("");
  });
  lines.push("WEEKLY REFLECTION");
  lines.push("-".repeat(40));
  lines.push(`Win: ${w.checkin.win||"-"}`);
  lines.push(`To improve: ${w.checkin.improve||"-"}`);
  downloadFile(`week-${w.weekNum}-log.txt`, lines.join("\n"), "text/plain");
}

      {activeView==="calendar"&&(

            <div style={{ display:"flex",gap:8 }}>
              <div style={{ flex:1,textAlign:"center" }}>

              <div style={{ flex:1,textAlign:"center" }}>
                <div style={{ fontSize:16,fontWeight:700,color:skate>0?COLORS.skate:t.textFaint }}>{skate}<span style={{ fontSize:10,color:t.textFaint }}>/{pSkt}</span></div>
                <div style={{ fontSize:9,color:t.textMuted }}>🛼 Skate</div>
              </div>
              <div style={{ flex:1,textAlign:"center" }}>
                <div style={{ fontSize:16,fontWeight:700,color:walkDaysGoalHit>0?COLORS.walk:t.textFaint }}>{walkDaysGoalHit}<span style={{ fontSize:10,color:t.textFaint }}>/7</span></div>

              </div>
            </div>
          </div>

          {/* day rows */}
          <div style={{ display:"flex",flexDirection:"column",gap:7 }}>
            {week.days.map((d,i)=>{
              const gymInfo=GYM_DAYS[d.gymDay]||GYM_DAYS.none;
              const isSel=selectedDay===i;
              const isRest=d.gymDay==="none"&&!d.skate;
              const accent=d.gymDay!=="none"?GYM_DAY_COLORS[d.gymDay]:d.skate?COLORS.skate:COLORS.rest;
              return (
                <div key={i}>
                  <div style={{ background:isRest?t.restBg:d.completed?t.completeBg:t.card,border:`1.5px solid ${d.completed?"#5FB84B":accent}`,borderRadius:isSel?"12px 12px 0 0":12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s" }}>
                    <div style={{ width:36,flexShrink:0,textAlign:"center" }}>
                      <div style={{ fontSize:9,fontWeight:700,color:t.textFaint,textTransform:"uppercase" }}>{DAY_LABELS[monIdx(d.date)]}</div>
                      <div style={{ fontSize:14,fontWeight:700,color:d.completed?"#5FB84B":accent }}>{d.date.getDate()}</div>
                    </div>
                    <div style={{ flex:1,display:"flex",flexDirection:"column",gap:3,cursor:"pointer" }} onClick={()=>setSelectedDay(isSel?null:i)}>
                      <div style={{ display:"flex",flexWrap:"wrap",gap:4,alignItems:"center" }}>
                        {d.gymDay!=="none"&&<Pill color={GYM_DAY_COLORS[d.gymDay]} label={`${gymInfo.label}`}/>}
                        {d.skate&&<Pill color={COLORS.skate} label="Skate 🛼"/>}
                        {isRest&&<Pill color={COLORS.rest} label="Rest 🌙"/>}
                        {d.walkSteps&&<span style={{ fontSize:9,color:COLORS.walk }}>🚶 {parseInt(d.walkSteps).toLocaleString()}</span>}
                        {d.weight&&<span style={{ fontSize:9,color:COLORS.accent }}>⚖️ {d.weight}kg</span>}
                        {d.motivation&&<span style={{ fontSize:13 }}>{d.motivation}</span>}
                      </div>
                      <MiniRecap d={d} gymInfo={gymInfo}/>
                    </div>
                    <button onClick={e=>{e.stopPropagation();setEditingDay(i);}} style={{ width:24,height:24,borderRadius:6,flexShrink:0,border:`1px solid ${t.cardBorder}`,background:t.inputBg,color:t.textMuted,cursor:"pointer",fontSize:11 }}>✎</button>
                    <div onClick={e=>{e.stopPropagation();updateDay(i,{completed:!d.completed});}} style={{ width:20,height:20,borderRadius:"50%",flexShrink:0,border:`2px solid ${d.completed?"#5FB84B":t.cardBorder}`,background:d.completed?"#5FB84B20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#5FB84B",cursor:"pointer" }}>{d.completed?"✓":""}</div>
                  </div>

                  {isSel&&(
                    <div style={{ background:t.cardAlt,border:`1.5px solid ${d.completed?"#5FB84B":accent}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"14px 14px 16px" }}>

                      <div style={{ marginBottom:10,background:COLORS.accent+"12",border:`1px solid ${COLORS.accent}30`,borderRadius:10,padding:"10px 12px" }}>

                        <div style={{ display:"flex",alignItems:"center",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,overflow:"hidden" }}>
                          <input type="number" placeholder="e.g. 68.5" value={d.weight} onChange={e=>updateDay(i,{weight:e.target.value})} onClick={e=>e.stopPropagation()} style={{ flex:1,background:"transparent",border:"none",color:t.textPrimary,fontSize:14,padding:"8px 10px",outline:"none",fontFamily:"inherit",fontWeight:600 }}/>
                          <span style={{ fontSize:10,color:t.textFaint,paddingRight:10 }}>kg</span>
                        </div>
                      </div>
                      {/* DAILY RATINGS */}
                      <div style={{ marginBottom:12,background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:10,padding:"10px 12px" }}>
                        <div style={{ fontSize:9,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8 }}>How are you feeling?</div>
                        <div style={{ display:"flex",gap:6 }} onClick={e=>e.stopPropagation()}>
                          {Object.keys(RATING_ICONS).map(key=>{
                            const icons=RATING_ICONS[key];
                            const val=d[key]||0;
                            return (
                              <button key={key} onClick={()=>updateDay(i,{[key]: val>=5?0:val+1})} style={{
                                flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                                padding:"7px 2px",borderRadius:8,cursor:"pointer",
                                border:`1.5px solid ${val>0?icons.color+"50":t.cardBorder}`,
                                background:val>0?icons.color+"12":t.inputBg,
                              }}>
                                <span style={{ fontSize:15 }}>{val>0?icons.filled:icons.empty}</span>
                                <span style={{ fontSize:9,fontWeight:700,color:val>0?icons.color:t.textFaint }}>{val>0?val:"–"}</span>
                                <span style={{ fontSize:7,color:t.textFaint,textTransform:"uppercase",letterSpacing:"0.04em" }}>{RATING_LABELS[key]}</span>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      {/* GYM */}
                      {d.gymDay!=="none"&&gymInfo.exercises.length>0&&(
                        <div style={{ marginBottom:14 }}>
                          <div style={{ fontSize:10,color:GYM_DAY_COLORS[d.gymDay],textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:3 }}>{gymInfo.label} — {gymInfo.focus}</div>
                          <div style={{ fontSize:10,color:t.textMuted,marginBottom:8 }}>{GYM_DAY_DETAILS[d.gymDay]}</div>
                          <div style={{ marginBottom:10 }}><div style={{ fontSize:9,color:t.textMuted,marginBottom:5 }}>Today's effort</div><EffortPicker value={d.gymEffort} onChange={v=>updateDay(i,{gymEffort:v})} t={t}/></div>
                          <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
                            {gymInfo.exercises.map((ex,ei)=>{
                              const exDone=d.gymDone?.[ei]||false;
                              const isPU=ex==="Dead Hang"||ex==="Negative Pull Up";
                              return (
                                <div key={ei} onClick={()=>updateDay(i,{gymDone:{...d.gymDone,[ei]:!exDone}})} style={{ display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:exDone?GYM_DAY_COLORS[d.gymDay]+"15":t.inputBg,border:`1px solid ${exDone?GYM_DAY_COLORS[d.gymDay]+"40":t.cardBorder}`,cursor:"pointer",opacity:exDone?0.6:1 }}>
                                  <div style={{ width:18,height:18,borderRadius:5,flexShrink:0,border:`1.5px solid ${exDone?GYM_DAY_COLORS[d.gymDay]:t.textFaint}`,background:exDone?GYM_DAY_COLORS[d.gymDay]:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff" }}>{exDone?"✓":""}</div>
                                  <span style={{ fontSize:12,color:exDone?t.textFaint:t.textBody,flex:1 }}>{ex}</span>
                                  {isPU&&<span style={{ fontSize:9,color:COLORS.pullup,fontWeight:700 }}>PULL UP</span>}
                                </div>
                              );
                            })}
                          </div>
                          <ConditionBadge condition={getGymCondition(Object.values(d.gymDone||{}).filter(Boolean).length,gymInfo.exercises.length,d.gymEffort)} t={t}/>
                        </div>
                      )}
                      {/* SKATE */}
                      {d.skate&&(
                        <div style={{ marginBottom:14,background:COLORS.skate+"10",border:`1px solid ${COLORS.skate}30`,borderRadius:10,padding:"12px" }}>
                          <div style={{ fontSize:10,color:COLORS.skate,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:10 }}>🛼 Skate Session</div>
                          <div style={{ marginBottom:10 }}><div style={{ fontSize:9,color:t.textMuted,marginBottom:5 }}>Effort level</div><EffortPicker value={d.skateEffort} onChange={v=>updateDay(i,{skateEffort:v})} t={t}/></div>
                          <div style={{ fontSize:9,color:t.textMuted,marginBottom:6 }}>From Garmin</div>
                          <div style={{ display:"flex",gap:8 }}>
                            <GarminInput icon="⏱" label="Duration" value={d.skateMinutes} onChange={v=>updateDay(i,{skateMinutes:v})} placeholder="38" unit="min" t={t}/>
                            <GarminInput icon="🔥" label="Calories" value={d.skateCalories} onChange={v=>updateDay(i,{skateCalories:v})} placeholder="337" unit="kcal" t={t}/>
                          </div>
                          <ConditionBadge condition={getSkateCondition(d.skateCalories,d.skateMinutes,d.skateEffort)} t={t}/>
                        </div>
                      )}
                      {/* WALK */}
                      <div style={{ marginBottom:14,background:COLORS.walk+"10",border:`1px solid ${COLORS.walk}30`,borderRadius:10,padding:"12px" }}>
                        <div style={{ fontSize:10,color:COLORS.walk,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:10 }}>🚶 Daily Steps</div>
                        <div style={{ marginBottom:10 }}><div style={{ fontSize:9,color:t.textMuted,marginBottom:5 }}>Effort level</div><EffortPicker value={d.walkEffort} onChange={v=>updateDay(i,{walkEffort:v})} t={t}/></div>
                        <div style={{ fontSize:9,color:t.textMuted,marginBottom:6 }}>From Garmin · goal: {STEP_GOAL.toLocaleString()}/day</div>
                        <GarminInput icon="👟" label="Steps" value={d.walkSteps} onChange={v=>updateDay(i,{walkSteps:v})} placeholder="8000" unit="steps" t={t}/>
                        <ConditionBadge condition={getWalkCondition(d.walkSteps,d.walkEffort)} t={t}/>
                      </div>
                      {/* MOTIVATION */}
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6 }}>Today's motivation</div>
                        <div style={{ display:"flex",gap:6 }}>
                          {MOTIVATION_EMOJIS.map(m=>{
                            const active=d.motivation===m.key;
                            return (
                              <button key={m.key} onClick={()=>updateDay(i,{motivation:active?"":m.key})} style={{ flex:1,padding:"8px 2px",borderRadius:8,fontSize:18,cursor:"pointer",border:`1.5px solid ${active?COLORS.accent:t.cardBorder}`,background:active?COLORS.accent+"20":t.inputBg }}>
                                <div>{m.key}</div>
                                <div style={{ fontSize:8,color:active?COLORS.accent:t.textFaint,marginTop:2 }}>{m.label}</div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      <textarea placeholder="How did it feel? What did you eat?..." value={d.notes} onChange={e=>updateDay(i,{notes:e.target.value})} onClick={e=>e.stopPropagation()} style={{ width:"100%",minHeight:44,background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,color:t.textBody,fontSize:12,padding:"8px 10px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5 }}/>
                      <DayRecap d={d} gymInfo={gymInfo} t={t}/>
                      <button onClick={()=>updateDay(i,{completed:!d.completed})} style={{ width:"100%",marginTop:10,padding:"10px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:`1.5px solid ${d.completed?"#5FB84B":t.cardBorder}`,background:d.completed?"#5FB84B20":t.inputBg,color:d.completed?"#5FB84B":t.textMuted }}>{d.completed?"✓ Day Complete!":"Mark Day Complete"}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ══ CHECK-IN ══ */}
      {activeView==="checkin"&&(
        <div style={{ padding:"14px 20px 28px" }}>
          <div style={{ fontSize:12,color:t.textMuted,lineHeight:1.6,marginBottom:14 }}>Week {week.weekNum} · <span style={{ color:COLORS.accent }}>{dateRange}</span></div>

          {/* weight — auto-summarized from daily logs */}
          <div style={{ background:COLORS.accent+"10",border:`1px solid ${COLORS.accent}30`,borderRadius:12,padding:14,marginBottom:12 }}>
            <div style={{ fontSize:11,color:COLORS.accent,fontWeight:600,marginBottom:8 }}>⚖️ Weight this week</div>
            {(()=>{
              const logged = week.days.filter(d=>d.weight);
              if (logged.length===0) return <div style={{ fontSize:11,color:t.textMuted }}>No weight logged yet — add it on any day 💡</div>;
              const first = parseFloat(logged[0].weight);
              const last  = parseFloat(logged[logged.length-1].weight);
              const diff  = (last-first).toFixed(1);
              return (
                <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                  <span style={{ fontSize:15,color:t.textBody }}>{first} kg</span>
                  {logged.length>1&&<><span style={{ fontSize:11,color:t.textFaint }}>→</span><span style={{ fontSize:16,fontWeight:700,color:COLORS.accent }}>{last} kg</span>
                    <span style={{ fontSize:11,fontWeight:700,color:parseFloat(diff)<0?"#5FB84B":parseFloat(diff)>0?"#E0584A":t.textMuted,background:(parseFloat(diff)<0?"#5FB84B":parseFloat(diff)>0?"#E0584A":t.textMuted)+"18",borderRadius:6,padding:"2px 6px" }}>{parseFloat(diff)>0?"+":""}{diff}</span></>}
                  <span style={{ fontSize:9,color:t.textFaint,marginLeft:"auto" }}>{logged.length}/7 days</span>
                </div>
              );
            })()}
          </div>

          {/* waist */}
          <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"13px 14px",marginBottom:12 }}>
            <div style={{ fontSize:11,color:t.textMuted,marginBottom:8,fontWeight:500 }}>📏 Waist measurement</div>
            <div style={{ display:"flex",alignItems:"center",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,overflow:"hidden" }}>
              <input type="number" placeholder="e.g. 72" value={week.checkin.waist} onChange={e=>updateCheckin("waist",e.target.value)} style={{ flex:1,background:"transparent",border:"none",color:t.textPrimary,fontSize:14,padding:"9px 10px",outline:"none",fontFamily:"inherit",fontWeight:600 }}/>
              <span style={{ fontSize:11,color:t.textFaint,paddingRight:12 }}>cm</span>
            </div>
          </div>

          {/* walk rollup */}
          <div style={{ background:COLORS.walk+"10",border:`1px solid ${COLORS.walk}30`,borderRadius:12,padding:"13px 14px",marginBottom:12 }}>
            <div style={{ fontSize:11,color:COLORS.walk,marginBottom:8,fontWeight:600 }}>🚶 Walking — auto-tracked</div>
            <div style={{ display:"flex",gap:14 }}>
              <div>
                <div style={{ fontSize:18,fontWeight:700,color:COLORS.walk }}>{walkDaysGoalHit}<span style={{ fontSize:11,color:t.textFaint }}>/7</span></div>
                <div style={{ fontSize:9,color:t.textMuted }}>days hit {STEP_GOAL.toLocaleString()} goal</div>
              </div>
              <div>
                <div style={{ fontSize:18,fontWeight:700,color:COLORS.walk }}>{totalWeekSteps.toLocaleString()}</div>
                <div style={{ fontSize:9,color:t.textMuted }}>total steps this week</div>
              </div>
            </div>
            <div style={{ fontSize:9,color:t.textFaint,marginTop:8 }}>Logged from your daily entries · {walkDaysLogged}/7 days logged</div>
          </div>

          {/* motivation weekly rollup */}
          {(()=>{
            const motis = week.days.map(d=>d.motivation).filter(Boolean);
            const cond = getMotivationCondition(motis);
            if (motis.length===0) return null;
            return (
              <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8 }}>
                <span style={{ fontSize:14 }}>💫</span>
                {motis.length>=3&&cond
                  ?<span style={{ fontSize:11,color:cond.color,fontWeight:600 }}>{cond.label}</span>
                  :<span style={{ fontSize:10,color:t.textMuted }}>Log {Math.max(0,3-motis.length)} more days for your weekly vibe</span>
                }
              </div>
            );
          })()}

          {/* ratings rollup */}
          {(()=>{
            const keys = Object.keys(RATING_ICONS);
            const anyLogged = keys.some(k=>week.days.some(d=>d[k]>0));
            if (!anyLogged) return null;
            return (
              <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:12 }}>
                <div style={{ fontSize:11,color:t.textMuted,fontWeight:600,marginBottom:8 }}>How you felt — auto-tracked</div>
                <div style={{ display:"flex",gap:6 }}>
                  {keys.map(k=>{
                    const icons=RATING_ICONS[k];
                    const vals=week.days.map(d=>d[k]).filter(v=>v>0);
                    const avg=vals.length>0?(vals.reduce((a,b)=>a+b,0)/vals.length):null;
                    return (
                      <div key={k} style={{ flex:1,textAlign:"center",background:t.inputBg,borderRadius:8,padding:"8px 4px" }}>
                        <div style={{ fontSize:14 }}>{icons.filled}</div>
                        <div style={{ fontSize:13,fontWeight:700,color:avg!==null?icons.color:t.textFaint,marginTop:2 }}>{avg!==null?avg.toFixed(1):"–"}</div>
                        <div style={{ fontSize:7,color:t.textFaint,textTransform:"uppercase",letterSpacing:"0.04em",marginTop:1 }}>{RATING_LABELS[k]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* text fields */}
          <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
            {CHECKIN_FIELDS.map(field=>(
              <div key={field.key} style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"13px 14px" }}>
                <div style={{ fontSize:11,color:t.textMuted,marginBottom:8,fontWeight:500 }}>{field.label}</div>
                <input type={field.type} placeholder={field.placeholder} value={week.checkin[field.key]} onChange={e=>updateCheckin(field.key,e.target.value)} style={{ width:"100%",background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,color:t.textBody,fontSize:13,padding:"8px 10px",outline:"none",boxSizing:"border-box",fontFamily:"inherit" }}/>
              </div>

          </div>
          <button onClick={saveCheckin} style={{ width:"100%",marginTop:16,padding:13,borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",border:"none",background:`linear-gradient(135deg,${COLORS.accent},#EE6A4C)`,color:"#fff" }}>Save Week {week.weekNum} ✓</button>
        </div>
      )}

      {/* ══ PROGRESS ══ */}
      {activeView==="progress"&&(
        <div style={{ padding:"14px 20px 28px" }}>
          <div style={{ fontSize:12,color:t.textMuted,lineHeight:1.6,marginBottom:14 }}>Your journey <span style={{ color:COLORS.accent }}>15 Jun → end of Oct</span></div>

          <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"14px 14px 10px",marginBottom:12 }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
              <div style={{ fontSize:11,color:t.textMuted,fontWeight:600 }}>Weight (kg)</div>
              <div style={{ display:"flex",gap:10,fontSize:9,color:t.textFaint }}>
                <span><span style={{ color:COLORS.accent }}>●</span> logged</span>
                <span><span style={{ color:"#5FB84B" }}>┅</span> 58kg goal</span>
              </div>
            </div>
            {(()=>{
              const allLogged=[];
              allWeeks.forEach(w=>w.days.forEach(d=>{ if(d.weight) allLogged.push(parseFloat(d.weight)); }));
              if (allLogged.length===0) return null;
              const current=allLogged[allLogged.length-1];
              const toGoal=(current-58).toFixed(1);
              return (
                <div style={{ marginBottom:8 }}>
                  <span style={{ fontSize:22,fontWeight:700,color:COLORS.accent }}>{current}</span>
                  <span style={{ fontSize:11,color:t.textMuted }}> kg right now</span>
                  {parseFloat(toGoal)>0&&<span style={{ fontSize:10,color:t.textMuted,marginLeft:6 }}>· {toGoal}kg to go</span>}
                </div>
              );
            })()}
            <WeightGraph allWeeks={allWeeks} t={t}/>
          </div>

          <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:"14px 14px 10px",marginBottom:16 }}>
            <div style={{ fontSize:11,color:t.textMuted,fontWeight:600,marginBottom:10 }}>📏 Waist (cm)</div>
            <WaistGraph allWeeks={allWeeks} t={t}/>
          </div>

          <div style={{ fontSize:10,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10 }}>Week by week</div>
          {allWeeks.map((w,i)=>{
            if (!w.checkinDone) return (
              <div key={i} style={{ display:"flex",alignItems:"center",gap:10,padding:"9px 14px",marginBottom:6,background:t.cardAlt,border:`1px solid ${t.cardBorder}`,borderRadius:10,opacity:0.5 }}>
                <div style={{ fontSize:11,color:t.textFaint,fontWeight:600,width:52 }}>Wk {w.weekNum}</div>
                <div style={{ fontSize:10,color:t.textFaint }}>{fmtDate(getWeekDates(i)[0])} – {fmtDate(getWeekDates(i)[6])}</div>
                <div style={{ marginLeft:"auto",fontSize:10,color:t.textFaint }}>not logged</div>
              </div>
            );
            const wLogged = w.days.filter(d=>d.weight);
            const wFirst = wLogged.length>0?parseFloat(wLogged[0].weight):null;
            const wLast  = wLogged.length>0?parseFloat(wLogged[wLogged.length-1].weight):null;
            const diff = (wFirst!==null&&wLast!==null&&wLogged.length>1)?(wLast-wFirst).toFixed(1):null;
            const diffColor=diff===null?t.textMuted:parseFloat(diff)<0?"#5FB84B":parseFloat(diff)>0?"#E0584A":t.textMuted;
            const wGym=w.days.filter(d=>d.gymDay!=="none"&&d.completed).length;
            const wSkate=w.days.filter(d=>d.skate&&d.completed).length;
            const wGoalDays=w.days.filter(d=>d.walkSteps&&parseInt(d.walkSteps)>=STEP_GOAL).length;
            const wCond=getWeekCondition(wGym,wSkate,wGoalDays);
            const gymEx=w.days.reduce((s,d)=>s+Object.values(d.gymDone||{}).filter(Boolean).length,0);
            const totSteps=w.days.reduce((s,d)=>s+(d.walkSteps?parseInt(d.walkSteps):0),0);
            const totSkMin=w.days.reduce((s,d)=>s+(d.skateMinutes?parseInt(d.skateMinutes):0),0);
            const totSkCal=w.days.reduce((s,d)=>s+(d.skateCalories?parseInt(d.skateCalories):0),0);
            const motis=w.days.map(d=>d.motivation).filter(Boolean);
            const mCond=getMotivationCondition(motis);
            const ratingVals=Object.keys(RATING_ICONS).flatMap(k=>w.days.map(d=>d[k]).filter(v=>v>0));
            const ratingAvg = ratingVals.length>0 ? (ratingVals.reduce((a,b)=>a+b,0)/ratingVals.length) : null;
            return (
              <div key={i} style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:8 }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8 }}>
                  <div><span style={{ fontSize:13,fontWeight:700,color:COLORS.accent }}>Week {w.weekNum}</span><span style={{ fontSize:10,color:t.textMuted,marginLeft:8 }}>{fmtDate(getWeekDates(i)[0])} – {fmtDate(getWeekDates(i)[6])}</span></div>
                  <button onClick={()=>exportWeek(w, getWeekDates(i))} style={{ background:"none",border:"none",color:t.textMuted,cursor:"pointer",fontSize:13 }}>⬇</button>
                </div>
                {wLogged.length>0&&(
                  <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                    <span style={{ fontSize:11,color:t.textMuted }}>⚖️</span>
                    <span style={{ fontSize:13,color:t.textBody }}>{wFirst} kg</span>
                    {wLogged.length>1&&<><span style={{ fontSize:10,color:t.textFaint }}>→</span><span style={{ fontSize:14,fontWeight:700,color:COLORS.accent }}>{wLast} kg</span></>}
                    {diff!==null&&<span style={{ fontSize:11,fontWeight:700,color:diffColor,background:diffColor+"18",borderRadius:6,padding:"2px 6px" }}>{parseFloat(diff)>0?"+":""}{diff}</span>}
                    {w.checkin.waist&&<span style={{ fontSize:11,color:t.textMuted }}>· 📏 {w.checkin.waist}cm</span>}
                  </div>
                )}
                {(wGym+wSkate+wGoalDays+totSteps)>0&&(
                  <div style={{ background:t.inputBg,borderRadius:8,padding:"8px 10px",marginBottom:8 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
                      <div style={{ fontSize:9,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.08em" }}>Activities</div>
                      {wCond&&<span style={{ fontSize:9,fontWeight:700,color:wCond.color }}>{wCond.label}</span>}
                    </div>
                    <div style={{ display:"flex",flexDirection:"column",gap:3 }}>
                      {wGym>0&&<div style={{ fontSize:10,color:COLORS.gym }}>🏋️ {wGym}× gym{gymEx>0?` · ${gymEx} exercises`:""}</div>}
                      {wSkate>0&&<div style={{ fontSize:10,color:COLORS.skate }}>🛼 {wSkate}× skate{totSkMin>0?` · ${totSkMin} min`:""}{totSkCal>0?` · ${totSkCal} kcal`:""}</div>}
                      {totSteps>0&&<div style={{ fontSize:10,color:COLORS.walk }}>🚶 {wGoalDays}/7 days hit goal · {totSteps.toLocaleString()} total steps</div>}
                    </div>
                  </div>
                )}
                {(ratingAvg!==null||motis.length>0)&&(
                  <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap" }}>
                    {ratingAvg!==null&&<span style={{ fontSize:10,color:t.textMuted }}>Wellbeing avg <span style={{ color:"#EE6A4C",fontWeight:700 }}>{ratingAvg.toFixed(1)}/5</span></span>}
                    {mCond&&motis.length>=3&&<span style={{ fontSize:10,color:mCond.color }}>💫 {mCond.label}</span>}
                  </div>
                )}
                {w.checkin.win&&<div style={{ fontSize:11,color:t.textBody,marginBottom:2 }}>🏅 {w.checkin.win}</div>}
                {w.checkin.improve&&<div style={{ fontSize:11,color:t.textMuted }}>💡 {w.checkin.improve}</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* ══ PULL UP ══ */}
      {activeView==="pullup"&&(
        <div style={{ padding:"14px 20px 28px" }}>
          <div style={{ fontSize:12,color:t.textMuted,lineHeight:1.6,marginBottom:14 }}>Your pull up journey 💪 Tap a stage to see your week-by-week plan.</div>
          <div style={{ background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:14,padding:18,marginBottom:14,textAlign:"center" }}>
            <div style={{ fontSize:40,marginBottom:4 }}>{pullUpDone[3]?"🏆":pullUpDone[2]?"💪🏻":pullUpDone[1]?"🔥":pullUpDone[0]?"⚡":"🎯"}</div>
            <div style={{ fontSize:20,fontWeight:700,color:COLORS.pullup }}>{pullUpDone.filter(Boolean).length}<span style={{ fontSize:13,color:t.textFaint,fontWeight:400 }}>/4 stages</span></div>
            <div style={{ fontSize:10,color:t.textMuted,marginTop:2 }}>{pullUpDone[3]?"You did it!! So proud of you 🥹":pullUpDone[2]?"First pull up achieved!":pullUpDone[1]?"Hanging strong — negatives next!":pullUpDone[0]?"Foundation locked in!":"Typically 8–12 weeks"}</div>
            <div style={{ height:5,background:t.divider,borderRadius:3,marginTop:12 }}><div style={{ height:"100%",borderRadius:3,background:`linear-gradient(90deg,${COLORS.pullup},#E0B72E)`,width:`${(pullUpDone.filter(Boolean).length/4)*100}%` }}/></div>
          </div>

          <div style={{ display:"flex",flexDirection:"column",gap:9 }}>
            {PULL_UP_STAGES.map((stage,i)=>{
              const done=pullUpDone[i],locked=i>0&&!pullUpDone[i-1],isOpen=pullUpOpen===i;
              const stageWeeks=PULLUP_WEEKLY.filter(w=>w.stage===i);
              const wksDone=stageWeeks.filter(sw=>pullUpWkDone[sw.week-1]).length;
              return (
                <div key={i} style={{ background:done?stage.color+"15":locked?t.cardAlt:t.card,border:`1.5px solid ${done?stage.color+"60":isOpen?stage.color+"40":locked?t.cardBorder:t.cardBorder}`,borderRadius:12,overflow:"hidden",opacity:locked?0.45:1 }}>
                  <div style={{ padding:"13px 16px",display:"flex",alignItems:"center",gap:12,cursor:locked?"default":"pointer" }} onClick={()=>!locked&&setPullUpOpen(isOpen?null:i)}>
                    <div style={{ width:34,height:34,borderRadius:10,flexShrink:0,border:`2px solid ${done?stage.color:locked?t.cardBorder:t.textFaint}`,background:done?stage.color+"20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?15:14,color:done?stage.color:t.textFaint }}>{done?"✓":["🪨","🧗","⬆️","🏆"][i]}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13,fontWeight:700,color:done?stage.color:locked?t.textFaint:t.textPrimary }}>{stage.label}</div>
                      <div style={{ fontSize:10,color:t.textMuted,marginTop:1 }}>{stage.week}{stageWeeks.length>0&&` · ${wksDone}/${stageWeeks.length} weeks logged`}</div>
                    </div>
                    {locked&&<span style={{ fontSize:11,color:t.textFaint }}>🔒</span>}
                    {!locked&&<span style={{ fontSize:13,color:t.textFaint,display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)" }}>›</span>}
                  </div>

                  {isOpen&&!locked&&(
                    <div style={{ borderTop:`1px solid ${t.cardBorder}`,padding:"13px 16px" }}>
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9,color:stage.color,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:5 }}>How to do it</div>
                        <div style={{ fontSize:12,color:t.textMuted,lineHeight:1.6 }}>{stage.howTo}</div>
                      </div>
                      <div style={{ background:stage.color+"10",border:`1px solid ${stage.color}30`,borderRadius:8,padding:"9px 11px",marginBottom:12 }}>
                        <div style={{ fontSize:9,color:stage.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3 }}>🎯 Milestone</div>
                        <div style={{ fontSize:11,color:t.textBody,lineHeight:1.5 }}>{stage.milestone}</div>
                      </div>

                      {stageWeeks.length>0&&(
                        <div style={{ marginBottom:12 }}>
                          <div style={{ fontSize:9,color:stage.color,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:7 }}>Week by week</div>
                          <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
                            {stageWeeks.map((sw)=>{
                              const wkOpen=pullUpWkOpen===sw.week, wkDone=pullUpWkDone[sw.week-1];
                              return (
                                <div key={sw.week} style={{ background:wkDone?stage.color+"12":t.inputBg,border:`1px solid ${wkDone?stage.color+"40":t.cardBorder}`,borderRadius:8,overflow:"hidden" }}>
                                  <div style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 10px" }}>
                                    <div onClick={e=>{e.stopPropagation();setPullUpWkDone(prev=>{const n=[...prev];n[sw.week-1]=!n[sw.week-1];return n;})}} style={{ width:18,height:18,borderRadius:6,flexShrink:0,border:`1.5px solid ${wkDone?stage.color:t.textFaint}`,background:wkDone?stage.color+"20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:wkDone?stage.color:t.textMuted,cursor:"pointer" }}>{wkDone?"✓":""}</div>
                                    <span style={{ fontSize:11,fontWeight:600,color:wkDone?stage.color:t.textBody,flex:1,cursor:"pointer" }} onClick={()=>setPullUpWkOpen(wkOpen?null:sw.week)}>Week {sw.week}</span>
                                    <span style={{ fontSize:10,color:t.textFaint,cursor:"pointer" }} onClick={()=>setPullUpWkOpen(wkOpen?null:sw.week)}>{wkOpen?"▾":"▸"}</span>
                                  </div>
                                  {wkOpen&&(
                                    <div style={{ borderTop:`1px solid ${t.cardBorder}`,padding:"9px 10px 11px" }}>
                                      <div style={{ display:"flex",flexDirection:"column",gap:4,marginBottom:8 }}>
                                        {sw.targets.map((tg,ti)=>(<div key={ti} style={{ display:"flex",gap:6,alignItems:"flex-start" }}><span style={{ color:stage.color,fontSize:9,flexShrink:0,marginTop:1 }}>•</span><span style={{ fontSize:11,color:t.textMuted,lineHeight:1.5 }}>{tg}</span></div>))}
                                      </div>
                                      <textarea placeholder="How did this week go?..." value={pullUpWkNotes[sw.week-1]} onChange={e=>{const n=[...pullUpWkNotes];n[sw.week-1]=e.target.value;setPullUpWkNotes(n);}} style={{ width:"100%",minHeight:44,background:t.card,border:`1px solid ${t.cardBorder}`,borderRadius:6,color:t.textBody,fontSize:11,padding:"7px 9px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5 }}/>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5 }}>Stage notes</div>
                        <textarea placeholder="Overall notes..." value={pullUpNotes[i]} onChange={e=>{const n=[...pullUpNotes];n[i]=e.target.value;setPullUpNotes(n);}} style={{ width:"100%",minHeight:52,background:t.inputBg,border:`1px solid ${t.inputBorder}`,borderRadius:8,color:t.textBody,fontSize:12,padding:"8px 10px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5 }}/>
                      </div>
                      <button onClick={()=>setPullUpDone(prev=>{const n=[...prev];n[i]=!n[i];return n;})} style={{ width:"100%",padding:"10px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",border:`1.5px solid ${done?stage.color:t.cardBorder}`,background:done?stage.color+"20":t.inputBg,color:done?stage.color:t.textMuted }}>{done?`✓ Stage ${i+1} Complete!`:`Mark Stage ${i+1} Complete`}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FitnessCalendar />);
  </script>
</body>
</html>

function getWeekDates(wi) {
  return Array.from({ length:7 }, (_,i) => {
    const d = new Date(WEEK_START);
    d.setDate(WEEK_START.getDate() + wi*7 + i);
    return d;
  });
}
function fmtDate(d) { return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`; }
function monIdx(d)  { return (d.getDay()+6)%7; }

const DEFAULT_SCHEDULE = [

function makeWeek(wi) {
  const dates = getWeekDates(wi);
  return {
    weekNum: wi+1,
    days: DEFAULT_SCHEDULE.map((s,i) => ({
      date:dates[i], gymDay:s.gymDay, skate:s.skate, walk:s.walk,
      completed:false, gymDone:{}, notes:"", motivation:"",
      gymEffort:"", skateEffort:"", walkEffort:"",
      walkSteps:"", skateMinutes:"", skateCalories:"",
    })),
    checkin:{ weightStart:"", weightEnd:"", waist:"", energy:0, sleep:0, stress:0, moodStability:0, cravings:0, hunger:0, win:"", improve:"" },
    checkinDone:false,
  };
}

/* ── condition functions ── */
function getWalkCondition(steps, effort) {
  const s = parseInt(steps);
  if (!steps||isNaN(s)||s<=0) return null;
  if (effort==="full") {
    if (s<4500)  return { label:"Walking Like You Meant It ⚡",  emoji:"⚡", color:"#60A5FA", tip:"Short but intentional — quality over quantity today, and that counts 💙" };
    if (s<7000)  return { label:"Power Walking Energy! 💪🏻",     emoji:"💪", color:"#34D399", tip:"You turned a stroll into a workout — full effort shows 💚" };
    if (s<10000) return { label:"Brisk & Purposeful 🔥",         emoji:"✨", color:"#FB923C", tip:"Brisk and purposeful — you walked like you had somewhere important to be 🔥" };
    return         { label:"Full Power, Full Distance 👑",        emoji:"🏅", color:"#FBBF24", tip:"Full power, full distance — walked like you had somewhere important to be 👑" };
  }
  if (effort==="medium") {
    if (s<4500)  return { label:"Short & Sweet 🌸",              emoji:"🌸", color:"#60A5FA", tip:"Short and sweet — still counts, still moves the needle 💙" };
    if (s<7000)  return { label:"Moving and Shining! ✨",         emoji:"🌿", color:"#34D399", tip:"Small steps, big energy — you showed up and that's everything 💚" };
    if (s<10000) return { label:"She's That Girl 🌀",            emoji:"✨", color:"#FB923C", tip:"She's walking, she's glowing, she's that girl — keep this energy 🔥" };
    return         { label:"10k Steady 🏅",                      emoji:"⭐", color:"#FBBF24", tip:"10k steps at a steady pace — that's a real achievement, not everyone does this 🏅" };
  }
  if (effort==="slow") {
    if (s<4500)  return { label:"Gentle Wander 🌙",              emoji:"🌙", color:"#60A5FA", tip:"Gentle wander — sometimes the soul needs a slow one 💙" };
    if (s<7000)  return { label:"Easy Stroll 🌿",                emoji:"🌿", color:"#34D399", tip:"Easy stroll, decent distance — your body moved and that's what matters 💚" };
    if (s<10000) return { label:"Long & Easy 🌿",                emoji:"💚", color:"#34D399", tip:"Long and easy — hours on your feet at a gentle pace does more than people realise 🌿" };
    return         { label:"10k on Slow Burn 🌟",                emoji:"🌟", color:"#FBBF24", tip:"10k steps at a gentle pace — hours on your feet. Underrated but incredible 🌟" };
  }
  if (s<4500)  return { label:"Baby Steps, Still Steps! 🐣", emoji:"🐾", color:"#60A5FA", tip:"Legs warming up! Every little loop adds up 💙" };
  if (s<7000)  return { label:"Actually Moving Today! 🌿",   emoji:"🌿", color:"#34D399", tip:"Small steps, big energy — you showed up and that's everything 💚" };
  if (s<10000) return { label:"Walking With Purpose! ✨",     emoji:"✨", color:"#FB923C", tip:"She's got places to be and steps to hit — this is that girl behaviour 🔥" };
  return         { label:"Superstar Walker! 🏅",              emoji:"⭐", color:"#FBBF24", tip:"10k+ steps?! You walked your way to the top tier — elite behaviour 👑" };
}

function getSkateCondition(cal, min, effort) {
  const c = parseInt(cal), m = parseInt(min);
  const hasC = cal&&!isNaN(c)&&c>0, hasM = min&&!isNaN(m)&&m>0;
  if (!hasC&&!hasM) return null;
  const score = hasC ? c : m*6;
  const size  = score<150?"low":score<300?"medium":"high";
  const minL  = hasM?` · ${m} min`:"", calL = hasC?` · ${c} kcal`:"";
  const combo = (minL+calL).trim();
  if (effort==="full") {
    if (size==="low")    return { label:"All Gas, Short Session ⚡",   emoji:"⚡", color:"#60A5FA", tip:`Burned bright and fast${combo} — all in on a short one 💙` };
    if (size==="medium") return { label:"Commitment On Wheels ⚡",     emoji:"💪", color:"#FB923C", tip:`Maximum energy, real distance${combo} — this is what commitment looks like on wheels ⚡` };
    return                 { label:"Elite Skater Mode 🚀",             emoji:"🚀", color:"#F472B6", tip:`Full power, long session${combo} — you're literally an athlete now 🚀` };
  }
  if (effort==="medium") {
    if (size==="low")    return { label:"Easy Warmup Skate 🌊",        emoji:"🌊", color:"#60A5FA", tip:`Wheels turning${combo} — easy warmup, that's what matters 💙` };
    if (size==="medium") return { label:"Smooth Operator 💨",          emoji:"💨", color:"#34D399", tip:`Smooth and steady${combo} — this is your bread and butter session 💚` };
    return                 { label:"Long & Steady 🌊",                 emoji:"🌊", color:"#34D399", tip:`Long and steady${combo} — you kept going when most people would've stopped 🌊` };
  }
  if (effort==="slow") {
    if (size==="low")    return { label:"Breezy Recovery Glide 🌸",    emoji:"🌸", color:"#60A5FA", tip:`Easy does it${combo} — joints and muscles grateful 💙` };
    if (size==="medium") return { label:"Gentle Pace, Real Time 💙",   emoji:"💙", color:"#34D399", tip:`Gentle pace, real time on skates${combo} — body was working even when it didn't feel like it 💙` };
    return                 { label:"Patience & Persistence 🌿",        emoji:"🌿", color:"#34D399", tip:`Took your time and stayed out there${combo} — that's exactly the right approach 🌿` };
  }
  if (score<150)  return { label:"Breezy Glide 🌊",   emoji:"🌊", color:"#60A5FA", tip:`Easy cruise${combo} — recovery energy, joints are grateful 💙` };
  if (score<250)  return { label:"Smooth Operator 💨", emoji:"💨", color:"#34D399", tip:`Solid session${combo} — wheels turning, love it! 💚` };
  if (score<350)  return { label:"She's Pushing! 🔥",  emoji:"🔥", color:"#FB923C", tip:`Strong work${combo} — you're really going for it! 🔥` };
  return            { label:"Full Send! 🚀",            emoji:"🚀", color:"#F472B6", tip:`Elite session${combo} — keeping up with runners on wheels 👟✨` };
}

function getGymCondition(done, total, effort) {
  if (!total||done===0) return null;
  const size = done<=2?"low":done<=4?"medium":"high";
  const isAll = done===total;
  if (effort==="full") {
    if (size==="low")    return { label:"Left It All On The Floor 🔥",      emoji:"🔥", color:"#FB923C", tip:`${done}/${total} exercises — your body hit its limit today and that's valid 💪` };
    if (size==="medium") return { label:"Pushed Hard, Got Halfway 💪🏻",     emoji:"💪", color:"#A78BFA", tip:`${done}/${total} done — full effort, real results. This is how progress is built 💜` };
    return                 { label:"Beast Mode Activated 👑",               emoji:"👑", color:"#FBBF24", tip:`${done}/${total} — full effort, full session. Unstoppable today 🏆` };
  }
  if (effort==="medium") {
    if (size==="low")    return { label:"Showed Up & Did What You Could 🌸", emoji:"🌸", color:"#60A5FA", tip:`${done}/${total} exercises — some days that's the win, and it still counts 💙` };
    if (size==="medium") return { label:"Solid Middle Ground ✨",            emoji:"✨", color:"#34D399", tip:`${done}/${total} done — steady effort, steady progress. Keep this up! 💚` };
    return                 { label:"Consistent Icon Behaviour 👑",          emoji:"✨", color:"#FBBF24", tip:`${done}/${total} — all exercises done, energy managed well — consistent icon behaviour 👑` };
  }
  if (effort==="slow") {
    if (size==="low")    return { label:"Don't Underestimate This 🤍",      emoji:"🌱", color:"#60A5FA", tip:`${done}/${total} exercises — showing up on a slow day takes effort too 🤍` };
    if (size==="medium") return { label:"Half The Session, All The Heart 🌸",emoji:"🌸", color:"#A78BFA", tip:`${done}/${total} done — taking it easy is also a strategy 🌸` };
    return                 { label:"Full Session On A Slow Day 🌱",         emoji:"🌿", color:"#34D399", tip:`${done}/${total} — quiet consistency on a slow day adds up more than you know 💚` };
  }
  if (done<=2)    return { label:"Showed Up & That's Enough 💛", emoji:"🌱", color:"#60A5FA", tip:`${done}/${total} exercises — showing up IS the workout. You'll feel it tomorrow!` };
  if (done<=4)    return { label:"Halfway Hero! 🌸",             emoji:"🌸", color:"#A78BFA", tip:`${done}/${total} done — real work today! Next session will be even better.` };
  if (!isAll)     return { label:"Almost There, Champ! 🔥",      emoji:"🔥", color:"#FB923C", tip:`${done}/${total} exercises — so close to a full session!` };
  return            { label:"Full Gym Session! ⭐",               emoji:"👑", color:"#FBBF24", tip:`${done}/${total} — you absolutely smashed it! Rest up, earned it 💪` };
}

function getWeekCondition(g, sk, w) {
  const t = g+sk+w;
  if (t===0) return null;
  if (w>=3&&g>=3&&sk>=2) return { label:"Unstoppable Week! 🏆", color:"#FBBF24" };
  if (w>=2&&g>=2&&sk>=1) return { label:"Solid Week 🔥",        color:"#FB923C" };
  if (t>=3)               return { label:"Good Effort 🌸",       color:"#A78BFA" };
  return                    { label:"Getting Going 🌱",           color:"#60A5FA" };
}

function getMotivationCondition(emojis) {
  const valid = emojis.filter(Boolean);
  if (valid.length===0) return null;
  const scores = valid.map(e=>MOTIVATION_EMOJIS.find(m=>m.key===e)?.score||0);
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  if (avg<=1.5) return { label:"Tough week mentally — that's real and it's okay 🤍",       color:"#60A5FA" };
  if (avg<=2.5) return { label:"Mostly low energy this week — rest was probably needed 🌙", color:"#A78BFA" };
  if (avg<=3.5) return { label:"Up and down week — very normal, you still showed up 🌸",   color:"#34D399" };
  if (avg<=4.5) return { label:"Strong motivation week — you really wanted it 💪🏻",         color:"#FB923C" };
  return          { label:"You were locked in this week — this energy is everything 👑",    color:"#FBBF24" };
}

/* ── small components ── */
function RatingInput({ value, onChange }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {[1,2,3,4,5].map(n=>(
        <button key={n} onClick={()=>onChange(n===value?0:n)} style={{
          width:32,height:32,borderRadius:8,
          border:`1.5px solid ${value>=n?COLORS.accent:"#2A2A32"}`,
          background:value>=n?COLORS.accent+"22":"#1A1A20",
          color:value>=n?COLORS.accent:"#444",
          fontSize:14,cursor:"pointer",fontWeight:600,
        }}>{n}</button>
      ))}
    </div>
  );
}

function Pill({ color, label }) {
  return (
    <span style={{
      fontSize:9,fontWeight:700,letterSpacing:"0.06em",
      background:color+"22",color,borderRadius:4,
      padding:"2px 5px",textTransform:"uppercase",whiteSpace:"nowrap",
    }}>{label}</span>
  );
}

function ConditionBadge({ condition }) {
  if (!condition) return null;
  return (
    <div style={{ marginTop:8,padding:"8px 10px",borderRadius:8,
      background:condition.color+"15",border:`1px solid ${condition.color}40`,
      display:"flex",alignItems:"flex-start",gap:8 }}>
      <span style={{ fontSize:16,flexShrink:0 }}>{condition.emoji}</span>
      <div>
        <div style={{ fontSize:11,fontWeight:700,color:condition.color }}>{condition.label}</div>
        {condition.tip&&<div style={{ fontSize:10,color:"#666",marginTop:2,lineHeight:1.4 }}>{condition.tip}</div>}
      </div>
    </div>
  );
}

function EffortPicker({ value, onChange }) {
  return (
    <div style={{ display:"flex",gap:6 }}>
      {EFFORT_LEVELS.map(e=>{
        const active=value===e.key;
        return (
          <button key={e.key} onClick={()=>onChange(active?"":e.key)} style={{
            flex:1,padding:"7px 4px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",
            border:`1.5px solid ${active?e.color:"#2A2A32"}`,
            background:active?e.color+"20":"#1A1A22",
            color:active?e.color:"#444",transition:"all 0.15s",
          }}>
            <div style={{ fontSize:14 }}>{e.emoji}</div>
            <div style={{ fontSize:9,marginTop:1 }}>{e.label}</div>
          </button>
        );
      })}
    </div>
  );
}

function GarminInput({ icon, label, value, onChange, placeholder, unit }) {
  return (
    <div style={{ flex:1 }}>
      <div style={{ fontSize:9,color:"#555",marginBottom:4,display:"flex",alignItems:"center",gap:4 }}>
        <span>{icon}</span>{label}
      </div>
      <div style={{ display:"flex",alignItems:"center",background:"#13131A",border:"1px solid #2A2A32",borderRadius:8,overflow:"hidden" }}>
        <input type="number" placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)}
          style={{ flex:1,background:"transparent",border:"none",color:"#DDD",fontSize:13,padding:"8px 8px",outline:"none",fontFamily:"inherit",fontWeight:600,width:0 }}/>
        <span style={{ fontSize:9,color:"#444",paddingRight:8,whiteSpace:"nowrap" }}>{unit}</span>
      </div>
    </div>
  );
}

function DayEditor({ day, onUpdate, onClose }) {

function WeightGraph({ allWeeks }) {
  const points = allWeeks.map((w,i)=>({
    wi:i,
    start:w.checkin.weightStart?parseFloat(w.checkin.weightStart):null,
    end:w.checkin.weightEnd?parseFloat(w.checkin.weightEnd):null,
  })).filter(p=>p.end!==null);
  if (points.length===0) return <div style={{ textAlign:"center",color:"#333",fontSize:12,padding:"24px 0" }}>No weight data yet — fill in your check-ins!</div>;
  const allVals=points.flatMap(p=>[p.start,p.end].filter(Boolean));
  const minV=Math.min(...allVals,58)-1,maxV=Math.max(...allVals,70)+1,range=maxV-minV;
  const W=320,H=120,P={t:12,b:28,l:32,r:16};
  const gW=W-P.l-P.r,gH=H-P.t-P.b;
  const xOf=wi=>P.l+(wi/(TOTAL_WEEKS-1))*gW;
  const yOf=v=>P.t+(1-(v-minV)/range)*gH;
  const endPts=points.map(p=>`${xOf(p.wi)},${yOf(p.end)}`).join(" ");
  const startPts=points.filter(p=>p.start).map(p=>`${xOf(p.wi)},${yOf(p.start)}`).join(" ");
  const tY=yOf(58);
  const yTicks=Array.from({length:4},(_,i)=>Math.round(minV+(range/3)*i));
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible" }}>
      {yTicks.map(v=>(
        <g key={v}>
          <line x1={P.l} y1={yOf(v)} x2={W-P.r} y2={yOf(v)} stroke="#1E1E28" strokeWidth="1"/>
          <text x={P.l-4} y={yOf(v)+3} fill="#444" fontSize="7" textAnchor="end">{v}</text>
        </g>
      ))}
      {58>=minV&&58<=maxV&&<>
        <line x1={P.l} y1={tY} x2={W-P.r} y2={tY} stroke="#34D399" strokeWidth="1" strokeDasharray="4,3" opacity="0.5"/>
        <text x={W-P.r+2} y={tY+3} fill="#34D399" fontSize="7">58</text>
      </>}
      {points.filter(p=>p.start).length>1&&<polyline points={startPts} fill="none" stroke={COLORS.accent} strokeWidth="1.5" strokeDasharray="3,3" opacity="0.4"/>}
      {points.length>1&&<polyline points={endPts} fill="none" stroke={COLORS.accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
      {points.map(p=>(
        <g key={p.wi}>
          {p.start&&<circle cx={xOf(p.wi)} cy={yOf(p.start)} r="2.5" fill="#1A1A20" stroke={COLORS.accent} strokeWidth="1.5" opacity="0.5"/>}
          <circle cx={xOf(p.wi)} cy={yOf(p.end)} r="3.5" fill={COLORS.accent} stroke="#0F0F12" strokeWidth="1.5"/>
          <text x={xOf(p.wi)} y={H-P.b+10} fill="#444" fontSize="7" textAnchor="middle">W{p.wi+1}</text>
        </g>
      ))}
    </svg>
  );
}

function MiniRecap({ d, gymInfo }) {
  if (!d.completed) return null;
  const gymDone=Object.values(d.gymDone||{}).filter(Boolean).length;
  const gC=d.gymDay!=="none"&&gymDone>0?getGymCondition(gymDone,gymInfo.exercises.length,d.gymEffort):null;
  const sC=d.skate&&(d.skateCalories||d.skateMinutes)?getSkateCondition(d.skateCalories,d.skateMinutes,d.skateEffort):null;
  const wC=d.walk&&d.walkSteps?getWalkCondition(d.walkSteps,d.walkEffort):null;
  const parts=[];
  if (gC)   parts.push({key:"g",color:gC.color,  text:`${gC.emoji} ${gymDone}/${gymInfo.exercises.length} ex`});
  if (sC)   parts.push({key:"s",color:sC.color,  text:`${sC.emoji} ${d.skateCalories?d.skateCalories+"kcal":d.skateMinutes+"min"}`});
  if (wC)   parts.push({key:"w",color:wC.color,  text:`${wC.emoji} ${parseInt(d.walkSteps).toLocaleString()} steps`});
  if (d.motivation) parts.push({key:"m",color:COLORS.accent,text:d.motivation});
  if (parts.length===0) return null;
  return (
    <div style={{ display:"flex",flexWrap:"wrap",gap:6,fontSize:9,fontWeight:600 }}>
      {parts.map(p=><span key={p.key} style={{ color:p.color }}>{p.text}</span>)}
    </div>
  );
}

function DayRecap({ d, gymInfo }) {
  const gymDone=Object.values(d.gymDone||{}).filter(Boolean).length;
  const hasGym=d.gymDay!=="none"&&gymInfo.exercises.length>0&&gymDone>0;
  const hasSkate=d.skate&&(d.skateCalories||d.skateMinutes);
  const hasWalk=d.walk&&d.walkSteps;
  if (!hasGym&&!hasSkate&&!hasWalk) return null;
  const gC=hasGym?getGymCondition(gymDone,gymInfo.exercises.length,d.gymEffort):null;
  const sC=hasSkate?getSkateCondition(d.skateCalories,d.skateMinutes,d.skateEffort):null;
  const wC=hasWalk?getWalkCondition(d.walkSteps,d.walkEffort):null;
  const effortOf=key=>EFFORT_LEVELS.find(e=>e.key===key);
  const allConds=[gC,sC,wC].filter(Boolean);
  const VIBES=["You really showed up today! 🌟","Look at you being consistent! 💪🏻","This is how goals get reached! ✨","Your future self is grateful! 🙏","Another day closer to 58kg! 🎯"];
  const vibe=VIBES[Math.floor((d.date.getDate()+d.date.getMonth())%VIBES.length)];
  return (
    <div style={{ marginTop:10,background:"#16161E",border:"1px solid #2A2A42",borderRadius:10,padding:"12px 14px" }}>
      <div style={{ fontSize:10,color:COLORS.accent,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:10 }}>✦ Today's Recap</div>
      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
        {hasGym&&gC&&(
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <span style={{ fontSize:13 }}>🏋️</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11,color:"#DDD",fontWeight:600 }}>
                Gym — {gymDone}/{gymInfo.exercises.length} exercises
                {d.gymEffort&&effortOf(d.gymEffort)&&<span style={{ marginLeft:6,fontSize:10,color:effortOf(d.gymEffort).color }}>{effortOf(d.gymEffort).emoji} {d.gymEffort}</span>}
              </div>
              <div style={{ fontSize:10,color:gC.color,marginTop:1 }}>{gC.emoji} {gC.label}</div>
            </div>
          </div>
        )}
        {hasSkate&&sC&&(
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <span style={{ fontSize:13 }}>🛼</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11,color:"#DDD",fontWeight:600 }}>
                Skate{d.skateMinutes&&<span style={{ color:"#666" }}> · {d.skateMinutes} min</span>}{d.skateCalories&&<span style={{ color:COLORS.skate }}> · {d.skateCalories} kcal</span>}
                {d.skateEffort&&effortOf(d.skateEffort)&&<span style={{ marginLeft:6,fontSize:10,color:effortOf(d.skateEffort).color }}>{effortOf(d.skateEffort).emoji} {d.skateEffort}</span>}
              </div>
              <div style={{ fontSize:10,color:sC.color,marginTop:1 }}>{sC.emoji} {sC.label}</div>
            </div>
          </div>
        )}
        {hasWalk&&wC&&(
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <span style={{ fontSize:13 }}>🚶</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11,color:"#DDD",fontWeight:600 }}>
                Walk · {parseInt(d.walkSteps).toLocaleString()} steps
                {d.walkEffort&&effortOf(d.walkEffort)&&<span style={{ marginLeft:6,fontSize:10,color:effortOf(d.walkEffort).color }}>{effortOf(d.walkEffort).emoji} {d.walkEffort}</span>}
              </div>
              <div style={{ fontSize:10,color:wC.color,marginTop:1 }}>{wC.emoji} {wC.label}</div>
            </div>
          </div>
        )}
      </div>
      {allConds.length>=2&&<div style={{ marginTop:10,paddingTop:10,borderTop:"1px solid #2A2A32",fontSize:11,color:"#888",fontStyle:"italic" }}>{vibe}</div>}

  );
}

                      {/* WALK */}

                          <div style={{ fontSize:9,color:"#555",marginBottom:6 }}>From Garmin</div>
                          <GarminInput icon="👟" label="Steps" value={d.walkSteps} onChange={v=>updateDay(i,{walkSteps:v})} placeholder="8000" unit="steps"/>

                      )}
                      {/* MOTIVATION */}
                      <div style={{ marginBottom:12 }}>
                        <div style={{ fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6 }}>Today's motivation</div>
                        <div style={{ display:"flex",gap:6 }}>

                            const active=d.motivation===m.key;

                              <button key={m.key} onClick={()=>updateDay(i,{motivation:active?"":m.key})} style={{ flex:1,padding:"8px 2px",borderRadius:8,fontSize:18,cursor:"pointer",border:`1.5px solid ${active?COLORS.accent:"#2A2A32"}`,background:active?COLORS.accent+"20":"#1A1A22",transition:"all 0.15s" }}>

                                <div style={{ fontSize:8,color:active?COLORS.accent:"#444",marginTop:2 }}>{m.label}</div>

                      <DayRecap d={d} gymInfo={gymInfo}/>
                      <button onClick={()=>updateDay(i,{completed:!d.completed})} style={{ width:"100%",marginTop:10,padding:"10px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:`1.5px solid ${d.completed?"#34D399":"#3A3A42"}`,background:d.completed?"#34D39920":"#1E1E28",color:d.completed?"#34D399":"#666",transition:"all 0.15s" }}>{d.completed?"✓ Day Complete!":"Mark Day Complete"}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* week progress */}
          <div style={{ marginTop:16 }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
              <span style={{ fontSize:10,color:"#444",textTransform:"uppercase",letterSpacing:"0.08em" }}>Week completion</span>
              <span style={{ fontSize:11,color:COLORS.accent,fontWeight:600 }}>{done}/7</span>
            </div>
            <div style={{ height:4,background:"#1E1E28",borderRadius:2 }}>
              <div style={{ height:"100%",borderRadius:2,background:`linear-gradient(90deg,${COLORS.accent},#F472B6)`,width:`${(done/7)*100}%`,transition:"width 0.4s ease" }}/>
            </div>
          </div>
        </div>
      )}

      {/* ══ CHECK-IN ══ */}
      {activeView==="checkin"&&(
        <div style={{ padding:"16px 20px 32px" }}>
          <div style={{ fontSize:13,color:"#666",lineHeight:1.6,marginBottom:16 }}>Week {week.weekNum} check-in · <span style={{ color:COLORS.accent }}>{dateRange}</span></div>

          {/* weight */}
          <div style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:14,marginBottom:12 }}>
            <div style={{ fontSize:11,color:"#888",fontWeight:500,marginBottom:12 }}>⚖️ Weekly Weight</div>
            <div style={{ display:"flex",gap:10,alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10,color:"#555",marginBottom:5 }}>Day 1 · {fmtDate(weekDates[0])}</div>
                <input type="number" placeholder="e.g. 69.0" value={week.checkin.weightStart} onChange={e=>updateCheckin("weightStart",e.target.value)} style={{ width:"100%",background:"#13131A",border:"1px solid #2A2A32",borderRadius:8,color:"#DDD",fontSize:14,padding:"9px 10px",outline:"none",boxSizing:"border-box",fontFamily:"inherit",fontWeight:600 }}/>
                <div style={{ fontSize:9,color:"#444",marginTop:4 }}>kg · start of week</div>
              </div>
              <div style={{ display:"flex",flexDirection:"column",alignItems:"center",paddingTop:22 }}>
                {(()=>{ const s=parseFloat(week.checkin.weightStart),e=parseFloat(week.checkin.weightEnd); const diff=(!isNaN(s)&&!isNaN(e)&&week.checkin.weightStart&&week.checkin.weightEnd)?(e-s).toFixed(1):null; return diff!==null?<div style={{ fontSize:12,fontWeight:700,color:parseFloat(diff)<0?"#34D399":parseFloat(diff)>0?"#F87171":"#888",background:parseFloat(diff)<0?"#34D39915":parseFloat(diff)>0?"#F8717115":"#2A2A32",border:`1px solid ${parseFloat(diff)<0?"#34D39940":parseFloat(diff)>0?"#F8717140":"#3A3A42"}`,borderRadius:8,padding:"6px 8px",textAlign:"center",whiteSpace:"nowrap" }}>{parseFloat(diff)>0?"+":""}{diff} kg</div>:<div style={{ fontSize:16,color:"#2A2A32" }}>→</div>; })()}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:10,color:"#555",marginBottom:5 }}>Day 7 · {fmtDate(weekDates[6])}</div>
                <input type="number" placeholder="e.g. 68.4" value={week.checkin.weightEnd} onChange={e=>updateCheckin("weightEnd",e.target.value)} style={{ width:"100%",background:"#13131A",border:"1px solid #2A2A32",borderRadius:8,color:"#DDD",fontSize:14,padding:"9px 10px",outline:"none",boxSizing:"border-box",fontFamily:"inherit",fontWeight:600 }}/>
                <div style={{ fontSize:9,color:"#444",marginTop:4 }}>kg · end of week</div>
              </div>
            </div>
          </div>

          {/* waist */}
          <div style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:"13px 14px",marginBottom:12 }}>
            <div style={{ fontSize:11,color:"#888",marginBottom:8,fontWeight:500 }}>📏 Waist measurement</div>
            <div style={{ display:"flex",alignItems:"center",background:"#13131A",border:"1px solid #2A2A32",borderRadius:8,overflow:"hidden" }}>
              <input type="number" placeholder="e.g. 72" value={week.checkin.waist} onChange={e=>updateCheckin("waist",e.target.value)} style={{ flex:1,background:"transparent",border:"none",color:"#DDD",fontSize:14,padding:"9px 10px",outline:"none",fontFamily:"inherit",fontWeight:600 }}/>
              <span style={{ fontSize:11,color:"#444",paddingRight:12 }}>cm</span>
            </div>
          </div>

          {/* motivation weekly */}
          <div style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:"12px 14px",marginBottom:12 }}>
            <div style={{ fontSize:11,color:"#888",fontWeight:500,marginBottom:8 }}>💫 Motivation this week</div>
            <div style={{ display:"flex",gap:6,marginBottom:8 }}>
              {week.days.map((d,i)=>(
                <div key={i} style={{ flex:1,textAlign:"center" }}>
                  <div style={{ fontSize:9,color:"#444",marginBottom:3 }}>{DAY_LABELS[i].slice(0,1)}</div>
                  <div style={{ fontSize:16 }}>{d.motivation||"·"}</div>
                </div>
              ))}
            </div>
            {(()=>{ const motis=week.days.map(d=>d.motivation).filter(Boolean); const cond=getMotivationCondition(motis); return motis.length>=3&&cond?<div style={{ fontSize:11,color:cond.color,fontWeight:600,borderTop:"1px solid #2A2A32",paddingTop:8 }}>{cond.label}</div>:<div style={{ fontSize:10,color:"#444",borderTop:"1px solid #2A2A32",paddingTop:8 }}>Log motivation on {Math.max(0,3-motis.length)} more days to see your weekly vibe</div>; })()}
          </div>

          {/* rating + text fields */}
          <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
            {CHECKIN_FIELDS.map(field=>(
              <div key={field.key} style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:"13px 14px" }}>
                <div style={{ fontSize:11,color:"#888",marginBottom:8,fontWeight:500 }}>{field.label}</div>
                {field.type==="rating"
                  ?<RatingInput value={week.checkin[field.key]} onChange={v=>updateCheckin(field.key,v)}/>

                }
              </div>
            ))}
          </div>
          <button onClick={saveCheckin} style={{ width:"100%",marginTop:16,padding:13,borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",border:"none",background:`linear-gradient(135deg,${COLORS.accent},#F472B6)`,color:"#fff",letterSpacing:"0.02em" }}>Save Week {week.weekNum} Check-in ✓</button>
        </div>
      )}

      {/* ══ PROGRESS ══ */}
      {activeView==="progress"&&(
        <div style={{ padding:"16px 20px 32px" }}>

              <div style={{ display:"flex",gap:10,fontSize:9,color:"#444" }}>
                <span><span style={{ color:COLORS.accent }}>━</span> End</span>
                <span><span style={{ color:COLORS.accent,opacity:0.5 }}>┅</span> Start</span>
                <span><span style={{ color:"#34D399" }}>┅</span> 58kg</span>
              </div>
            </div>
            <WeightGraph allWeeks={allWeeks}/>
          </div>
          <div style={{ fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10 }}>Week by week</div>
          {allWeeks.map((w,i)=>{
            if (!w.checkinDone) return (
              <div key={i} style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:6,background:"#141418",border:"1px solid #1E1E22",borderRadius:10,opacity:0.35 }}>
                <div style={{ fontSize:11,color:"#333",fontWeight:600,width:52 }}>Wk {w.weekNum}</div>
                <div style={{ fontSize:10,color:"#333" }}>{fmtDate(getWeekDates(i)[0])} – {fmtDate(getWeekDates(i)[6])}</div>
                <div style={{ marginLeft:"auto",fontSize:10,color:"#2A2A32" }}>not logged</div>
              </div>
            );
            const diff=(w.checkin.weightStart&&w.checkin.weightEnd)?(parseFloat(w.checkin.weightEnd)-parseFloat(w.checkin.weightStart)).toFixed(1):null;
            const diffColor=diff===null?"#888":parseFloat(diff)<0?"#34D399":parseFloat(diff)>0?"#F87171":"#888";
            const daysCompleted=w.days.filter(d=>d.completed).length;
            const wGym=w.days.filter(d=>d.gymDay!=="none"&&d.completed).length;
            const wSkate=w.days.filter(d=>d.skate&&d.completed).length;
            const wWalk=w.days.filter(d=>d.walk&&d.completed).length;
            const wCond=getWeekCondition(wGym,wSkate,wWalk);
            const gymEx=w.days.reduce((s,d)=>s+Object.values(d.gymDone||{}).filter(Boolean).length,0);
            const totSteps=w.days.reduce((s,d)=>s+(d.walkSteps?parseInt(d.walkSteps):0),0);
            const totSkMin=w.days.reduce((s,d)=>s+(d.skateMinutes?parseInt(d.skateMinutes):0),0);
            const totSkCal=w.days.reduce((s,d)=>s+(d.skateCalories?parseInt(d.skateCalories):0),0);
            const motis=w.days.map(d=>d.motivation).filter(Boolean);
            const mCond=getMotivationCondition(motis);
            return (
              <div key={i} style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:"12px 14px",marginBottom:8 }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8 }}>
                  <div><span style={{ fontSize:13,fontWeight:700,color:COLORS.accent }}>Week {w.weekNum}</span><span style={{ fontSize:10,color:"#555",marginLeft:8 }}>{fmtDate(getWeekDates(i)[0])} – {fmtDate(getWeekDates(i)[6])}</span></div>
                  <div style={{ fontSize:10,color:"#555" }}>{daysCompleted}/7 days ✓</div>
                </div>
                {(w.checkin.weightStart||w.checkin.weightEnd)&&(
                  <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
                    <span style={{ fontSize:11,color:"#555" }}>⚖️</span>
                    {w.checkin.weightStart&&<span style={{ fontSize:13,color:"#888" }}>{w.checkin.weightStart} kg</span>}
                    {w.checkin.weightStart&&w.checkin.weightEnd&&<span style={{ fontSize:10,color:"#333" }}>→</span>}
                    {w.checkin.weightEnd&&<span style={{ fontSize:14,fontWeight:700,color:COLORS.accent }}>{w.checkin.weightEnd} kg</span>}
                    {diff!==null&&<span style={{ fontSize:11,fontWeight:700,color:diffColor,background:diffColor+"18",borderRadius:6,padding:"2px 6px" }}>{parseFloat(diff)>0?"+":""}{diff}</span>}
                    {w.checkin.waist&&<span style={{ fontSize:11,color:"#555",marginLeft:4 }}>· 📏 {w.checkin.waist}cm</span>}
                  </div>
                )}
                {(wGym+wSkate+wWalk)>0&&(
                  <div style={{ background:"#13131A",borderRadius:8,padding:"8px 10px",marginBottom:8 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
                      <div style={{ fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:"0.08em" }}>Activities</div>
                      {wCond&&<span style={{ fontSize:9,fontWeight:700,color:wCond.color }}>{wCond.label}</span>}
                    </div>
                    <div style={{ display:"flex",flexDirection:"column",gap:3 }}>
                      {wGym>0&&<div style={{ fontSize:10,color:COLORS.gym }}>🏋️ {wGym}× gym{gymEx>0?` · ${gymEx} exercises`:""}</div>}
                      {wSkate>0&&<div style={{ fontSize:10,color:COLORS.skate }}>🛼 {wSkate}× skate{totSkMin>0?` · ${totSkMin} min`:""}{totSkCal>0?` · ${totSkCal} kcal`:""}</div>}
                      {wWalk>0&&<div style={{ fontSize:10,color:COLORS.walk }}>🚶 {wWalk}× walk{totSteps>0?` · ${totSteps.toLocaleString()} steps`:""}</div>}
                    </div>
                  </div>
                )}
                {(w.checkin.energy||w.checkin.sleep||w.checkin.stress||w.checkin.moodStability||w.checkin.cravings)>0&&(
                  <div style={{ display:"flex",gap:8,marginBottom:6,flexWrap:"wrap" }}>
                    {[{l:"Energy",k:"energy"},{l:"Sleep",k:"sleep"},{l:"Stress",k:"stress"},{l:"Mood",k:"moodStability"},{l:"Cravings",k:"cravings"}].map(r=>w.checkin[r.k]>0&&(
                      <div key={r.k} style={{ fontSize:10,color:"#555" }}>{r.l} <span style={{ color:COLORS.accent,fontWeight:700 }}>{w.checkin[r.k]}/5</span></div>
                    ))}
                  </div>
                )}
                {motis.length>0&&<div style={{ fontSize:10,color:"#555",marginBottom:4 }}>💫 {motis.join(" ")}{mCond&&<span style={{ color:mCond.color,marginLeft:4 }}>· {mCond.label}</span>}</div>}
                {w.checkin.win&&<div style={{ fontSize:11,color:"#888",marginBottom:2 }}>🏅 {w.checkin.win}</div>}
                {w.checkin.improve&&<div style={{ fontSize:11,color:"#555" }}>💡 {w.checkin.improve}</div>}
              </div>
            );
          })}
        </div>
      )}

      {/* ══ PULL UP ══ */}
      {activeView==="pullup"&&(
        <div style={{ padding:"16px 20px 32px" }}>
          <div style={{ fontSize:13,color:"#666",lineHeight:1.6,marginBottom:16 }}>Your pull up journey 💪 Tap a stage to expand it and see your week-by-week plan.</div>
          {/* hero */}
          <div style={{ background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:14,padding:20,marginBottom:16,textAlign:"center" }}>
            <div style={{ fontSize:44,marginBottom:4 }}>{pullUpDone[3]?"🏆":pullUpDone[2]?"💪🏻":pullUpDone[1]?"🔥":pullUpDone[0]?"⚡":"🎯"}</div>
            <div style={{ fontSize:22,fontWeight:700,color:COLORS.pullup }}>{pullUpDone.filter(Boolean).length}<span style={{ fontSize:14,color:"#444",fontWeight:400 }}>/4 stages</span></div>
            <div style={{ fontSize:11,color:"#555",marginTop:2 }}>{pullUpDone[3]?"You did it!! So proud of you 🥹":pullUpDone[2]?"First pull up achieved! Build from here":pullUpDone[1]?"Hanging strong — negatives next!":pullUpDone[0]?"Foundation locked in — add dead hangs!":"First pull up goal · typically 8–12 weeks"}</div>
            <div style={{ height:6,background:"#2A2A32",borderRadius:3,marginTop:14 }}>
              <div style={{ height:"100%",borderRadius:3,background:`linear-gradient(90deg,${COLORS.pullup},#FBBF24)`,width:`${(pullUpDone.filter(Boolean).length/4)*100}%`,transition:"width 0.5s ease" }}/>
            </div>
          </div>

          {/* stage cards */}
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {PULL_UP_STAGES.map((stage,i)=>{
              const done=pullUpDone[i],locked=i>0&&!pullUpDone[i-1],isOpen=pullUpOpen===i;
              const stageWeeks=PULLUP_WEEKLY.filter(w=>w.stage===i);
              const wksDone=stageWeeks.filter(sw=>pullUpWkDone[sw.week-1]).length;
              return (
                <div key={i} style={{ background:done?"#1A1810":locked?"#141418":"#1A1A20",border:`1.5px solid ${done?stage.color+"60":isOpen?stage.color+"40":locked?"#1E1E22":"#2A2A32"}`,borderRadius:12,overflow:"hidden",opacity:locked?0.4:1,transition:"all 0.15s" }}>
                  <div style={{ padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:locked?"default":"pointer" }} onClick={()=>!locked&&setPullUpOpen(isOpen?null:i)}>
                    <div style={{ width:36,height:36,borderRadius:10,flexShrink:0,border:`2px solid ${done?stage.color:locked?"#2A2A32":"#3A3A42"}`,background:done?stage.color+"20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?16:15,color:done?stage.color:"#444" }}>{done?"✓":["🪨","🧗","⬆️","🏆"][i]}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13,fontWeight:700,color:done?stage.color:locked?"#444":"#F1F0EE" }}>{stage.label}</div>
                      <div style={{ fontSize:10,color:"#555",marginTop:1 }}>{stage.week} · {stage.sub}</div>
                      {stageWeeks.length>0&&<div style={{ fontSize:9,color:done?stage.color:"#555",marginTop:2 }}>{wksDone}/{stageWeeks.length} weeks logged</div>}
                    </div>
                    {locked&&<span style={{ fontSize:11,color:"#333" }}>🔒</span>}
                    {!locked&&<span style={{ fontSize:14,color:"#444",transition:"transform 0.2s",display:"inline-block",transform:isOpen?"rotate(90deg)":"rotate(0deg)" }}>›</span>}
                  </div>

                  {isOpen&&!locked&&(
                    <div style={{ borderTop:"1px solid #2A2A32",padding:"14px 16px" }}>
                      {/* how to */}
                      <div style={{ marginBottom:14 }}>
                        <div style={{ fontSize:9,color:stage.color,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:6 }}>How to do it</div>
                        <div style={{ fontSize:12,color:"#888",lineHeight:1.7 }}>{stage.howTo}</div>
                      </div>
                      {/* general schedule */}
                      <div style={{ marginBottom:14 }}>
                        <div style={{ fontSize:9,color:stage.color,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8 }}>General schedule</div>
                        <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                          {stage.schedule.map((s,si)=>(
                            <div key={si} style={{ display:"flex",gap:10,background:"#13131A",borderRadius:8,padding:"8px 10px" }}>
                              <span style={{ fontSize:9,color:stage.color,fontWeight:700,flexShrink:0,paddingTop:1,minWidth:60 }}>{s.day}</span>
                              <span style={{ fontSize:11,color:"#AAA",lineHeight:1.5 }}>{s.task}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      {/* milestone */}
                      <div style={{ background:stage.color+"10",border:`1px solid ${stage.color}30`,borderRadius:8,padding:"10px 12px",marginBottom:14 }}>
                        <div style={{ fontSize:9,color:stage.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4 }}>🎯 Milestone to unlock next stage</div>
                        <div style={{ fontSize:11,color:"#AAA",lineHeight:1.5 }}>{stage.milestone}</div>
                      </div>

                      {/* week by week */}
                      {stageWeeks.length>0&&(
                        <div style={{ marginBottom:14 }}>
                          <div style={{ fontSize:9,color:stage.color,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8 }}>Week by week ({wksDone}/{stageWeeks.length} done)</div>
                          <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                            {stageWeeks.map((sw)=>{
                              const wkOpen=pullUpWkOpen===sw.week;
                              const wkDone=pullUpWkDone[sw.week-1];
                              return (
                                <div key={sw.week} style={{ background:wkDone?"#141810":"#13131A",border:`1px solid ${wkDone?stage.color+"40":"#2A2A32"}`,borderRadius:8,overflow:"hidden" }}>
                                  <div style={{ display:"flex",alignItems:"center",gap:8,padding:"9px 10px" }}>
                                    <div onClick={e=>{e.stopPropagation();setPullUpWkDone(prev=>{const n=[...prev];n[sw.week-1]=!n[sw.week-1];return n;})}} style={{ width:20,height:20,borderRadius:6,flexShrink:0,border:`1.5px solid ${wkDone?stage.color:"#3A3A42"}`,background:wkDone?stage.color+"20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:wkDone?stage.color:"#555",cursor:"pointer" }}>{wkDone?"✓":""}</div>
                                    <span style={{ fontSize:11,fontWeight:600,color:wkDone?stage.color:"#AAA",flex:1,cursor:"pointer" }} onClick={()=>setPullUpWkOpen(wkOpen?null:sw.week)}>Week {sw.week}</span>
                                    <span style={{ fontSize:11,color:"#444",cursor:"pointer" }} onClick={()=>setPullUpWkOpen(wkOpen?null:sw.week)}>{wkOpen?"▾":"▸"}</span>
                                  </div>
                                  {wkOpen&&(
                                    <div style={{ borderTop:"1px solid #1E1E28",padding:"10px 10px 12px" }}>
                                      <div style={{ display:"flex",flexDirection:"column",gap:5,marginBottom:10 }}>
                                        {sw.targets.map((t,ti)=>(
                                          <div key={ti} style={{ display:"flex",gap:6,alignItems:"flex-start" }}>
                                            <span style={{ color:stage.color,fontSize:10,flexShrink:0,marginTop:1 }}>•</span>
                                            <span style={{ fontSize:11,color:"#888",lineHeight:1.5 }}>{t}</span>
                                          </div>
                                        ))}
                                      </div>
                                      <textarea placeholder="How did this week go? Hang time, reps, how it felt..." value={pullUpWkNotes[sw.week-1]} onChange={e=>{const n=[...pullUpWkNotes];n[sw.week-1]=e.target.value;setPullUpWkNotes(n);}} style={{ width:"100%",minHeight:52,background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:6,color:"#AAA",fontSize:11,padding:"7px 9px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5 }}/>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* stage notes */}
                      <div style={{ marginBottom:14 }}>
                        <div style={{ fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6 }}>Stage notes</div>
                        <textarea placeholder="Overall notes for this stage..." value={pullUpNotes[i]} onChange={e=>{const n=[...pullUpNotes];n[i]=e.target.value;setPullUpNotes(n);}} style={{ width:"100%",minHeight:64,background:"#13131A",border:"1px solid #2A2A32",borderRadius:8,color:"#AAA",fontSize:12,padding:"8px 10px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",lineHeight:1.5 }}/>
                      </div>
                      <button onClick={()=>setPullUpDone(prev=>{const n=[...prev];n[i]=!n[i];return n;})} style={{ width:"100%",padding:"10px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",border:`1.5px solid ${done?stage.color:"#3A3A42"}`,background:done?stage.color+"20":"#1E1E28",color:done?stage.color:"#666",transition:"all 0.15s" }}>{done?`✓ Stage ${i+1} Complete! Tap to undo`:`Mark Stage ${i+1} as Complete`}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* tips */}
          <div style={{ marginTop:16,background:"#1A1A20",border:"1px solid #2A2A32",borderRadius:12,padding:"14px 16px" }}>
            <div style={{ fontSize:10,color:COLORS.pullup,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,marginBottom:10 }}>Always remember 💜</div>
            <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
              {[{icon:"🏋️",text:"Dead hangs + negatives are on every Day B workout"},{icon:"📈",text:"Lat pulldown is your #1 builder — pull to chest, lower slowly"},{icon:"🛼",text:"Skating builds core and leg drive which helps pull ups too!"},{icon:"😴",text:"Rest and protein are when you actually get stronger"},{icon:"✨",text:"One day it just clicks — trust the process"}].map((t,i)=>(
                <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
                  <span style={{ fontSize:13,flexShrink:0 }}>{t.icon}</span>
                  <span style={{ fontSize:12,color:"#666",lineHeight:1.5 }}>{t.text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FitnessCalendar />);
  </script>
</body>
</html>

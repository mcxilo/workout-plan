const timeVariants = {
  short: { label: "45 min", exercises: 4 },
  medium: { label: "1 hour", exercises: 6 },
  long: { label: "1.5 hrs", exercises: 8 },
};

const pullUpStages = [
  { week: "Wk 1–3", label: "Foundation", desc: "Lat pulldown + cable row only" },
  { week: "Wk 2–6", label: "Dead Hangs", desc: "Add dead hangs every session" },
  { week: "Wk 3–6", label: "Negatives", desc: "Add negative pull ups" },
  { week: "Wk 6–12", label: "First Pull Up!", desc: "Attempt unassisted after band sets" },
];

// --- progress persistence (so your friend's checkmarks stick) ---
function loadState(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

function WorkoutPlan() {
  const [activeDay, setActiveDay] = useState("A");
  const [timeMode, setTimeMode] = useState("medium");
  const [checkedExercises, setCheckedExercises] = useState(() => loadState("wp_checked", {}));
  const [expandedExercise, setExpandedExercise] = useState(null);
  const [pullUpStagesDone, setPullUpStagesDone] = useState(() => loadState("wp_pullup", [false, false, false, false]));
  const [showPullUp, setShowPullUp] = useState(false);

  useEffect(() => { localStorage.setItem("wp_checked", JSON.stringify(checkedExercises)); }, [checkedExercises]);
  useEffect(() => { localStorage.setItem("wp_pullup", JSON.stringify(pullUpStagesDone)); }, [pullUpStagesDone]);

  const day = workouts[activeDay];
  const count = timeVariants[timeMode].exercises;
  const visibleExercises = day.exercises.slice(0, count);

  const toggleCheck = (key) => {
    setCheckedExercises((prev) => ({ ...prev, [key]: !prev[key] }));
  };

  const resetDay = () => {
    setCheckedExercises((prev) => {
      const next = { ...prev };
      visibleExercises.forEach((e) => { delete next[`${activeDay}-${e.name}`]; });
      return next;
    });
  };

  const completedCount = visibleExercises.filter(
    (e) => checkedExercises[`${activeDay}-${e.name}`]
  ).length;

  return (
    <div style={{
      fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
      background: "#0F0F12",
      minHeight: "100vh",
      color: "#F1F0EE",
      padding: "0 0 40px 0",
    }}>
      <div style={{
        background: "linear-gradient(135deg, #1A1A20 0%, #16161C 100%)",
        padding: "28px 20px 20px",
        borderBottom: "1px solid #2A2A32",
      }}>
        <div style={{ fontSize: 11, letterSpacing: "0.15em", color: "#888", textTransform: "uppercase", marginBottom: 6 }}>
          Your Gym Plan
        </div>
        <h1 style={{ margin: 0, fontSize: 26, fontWeight: 700, color: "#F1F0EE", letterSpacing: "-0.02em" }}>
          2–3× Weekly Split
        </h1>
        <p style={{ margin: "6px 0 0", fontSize: 13, color: "#666", lineHeight: 1.5 }}>
          Lower body · Upper body · Full body
        </p>
      </div>

      <div style={{ padding: "16px 20px 0", display: "flex", gap: 10 }}>
        {Object.entries(workouts).map(([key, w]) => (
          <button
            key={key}
            onClick={() => { setActiveDay(key); setExpandedExercise(null); }}
            style={{
              flex: 1,
              padding: "12px 8px",
              borderRadius: 12,
              border: activeDay === key ? `2px solid ${w.color}` : "2px solid #2A2A32",
              background: activeDay === key ? `${w.color}18` : "#1A1A20",
              color: activeDay === key ? w.color : "#666",
              cursor: "pointer",
              fontWeight: 600,
              fontSize: 12,
              transition: "all 0.2s",
            }}
          >
            <div style={{ fontSize: 15, marginBottom: 2 }}>{w.label}</div>
            <div style={{ fontSize: 10, opacity: 0.8 }}>{w.focus}</div>
          </button>
        ))}
      </div>

      <div style={{ padding: "14px 20px 0" }}>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>
          Time available today
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {Object.entries(timeVariants).map(([key, v]) => (
            <button
              key={key}
              onClick={() => setTimeMode(key)}
              style={{
                flex: 1,
                padding: "8px 4px",
                borderRadius: 8,
                border: timeMode === key ? `1.5px solid ${day.color}` : "1.5px solid #2A2A32",
                background: timeMode === key ? `${day.color}15` : "#1A1A20",
                color: timeMode === key ? day.color : "#555",
                cursor: "pointer",
                fontSize: 12,
                fontWeight: 500,
                transition: "all 0.2s",
              }}
            >
              {v.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding: "14px 20px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em" }}>
            Progress
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 12, color: day.color, fontWeight: 600 }}>
              {completedCount}/{visibleExercises.length}
            </span>
            {completedCount > 0 && (
              <button onClick={resetDay} style={{ fontSize: 10, color: "#555", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>
                reset
              </button>
            )}
          </span>
        </div>
        <div style={{ height: 4, background: "#2A2A32", borderRadius: 2, overflow: "hidden" }}>
          <div style={{
            height: "100%",
            width: `${visibleExercises.length > 0 ? (completedCount / visibleExercises.length) * 100 : 0}%`,
            background: day.color,
            borderRadius: 2,
            transition: "width 0.4s ease",
          }} />
        </div>
      </div>

      <div style={{ padding: "16px 20px 0", display: "flex", flexDirection: "column", gap: 12 }}>
        {visibleExercises.map((ex, i) => {
          const checkKey = `${activeDay}-${ex.name}`;
          const isChecked = !!checkedExercises[checkKey];
          const isExpanded = expandedExercise === checkKey;

          return (
            <div
              key={ex.name}
              style={{
                background: isChecked ? "#1A1A20" : "#1C1C24",
                borderRadius: 14,
                border: `1.5px solid ${isChecked ? "#2A2A32" : isExpanded ? day.color + "60" : "#2A2A32"}`,
                overflow: "hidden",
                transition: "all 0.2s",
                opacity: isChecked ? 0.6 : 1,
              }}
            >
              <div
                style={{ padding: "14px 16px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}
                onClick={() => setExpandedExercise(isExpanded ? null : checkKey)}
              >
                <div style={{
                  width: 28,
                  height: 28,
                  borderRadius: "50%",
                  background: `${day.color}20`,
                  color: day.color,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 12,
                  fontWeight: 700,
                  flexShrink: 0,
                }}>
                  {i + 1}
                </div>

                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: isChecked ? "#555" : "#F1F0EE", marginBottom: 2 }}>
                    {ex.name}
                    {ex.machine && (
                      <span style={{ marginLeft: 6, fontSize: 9, background: "#2A2A32", color: "#888", padding: "2px 5px", borderRadius: 4, letterSpacing: "0.05em" }}>
                        MACHINE
                      </span>
                    )}
                    {ex.pullup && (
                      <span style={{ marginLeft: 6, fontSize: 9, background: "#F472B630", color: "#F472B6", padding: "2px 5px", borderRadius: 4, letterSpacing: "0.05em" }}>
                        PULL UP GOAL
                      </span>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: "#666" }}>{ex.sets} · {ex.rest}</div>
                </div>

                <div style={{ color: "#444", fontSize: 16, transition: "transform 0.2s", transform: isExpanded ? "rotate(90deg)" : "rotate(0deg)" }}>›</div>

                <div
                  onClick={(e) => { e.stopPropagation(); toggleCheck(checkKey); }}
                  style={{
                    width: 24,
                    height: 24,
                    borderRadius: 6,
                    border: `2px solid ${isChecked ? day.color : "#3A3A42"}`,
                    background: isChecked ? day.color : "transparent",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    cursor: "pointer",
                    flexShrink: 0,
                    transition: "all 0.15s",
                  }}
                >
                  {isChecked && <span style={{ color: "#fff", fontSize: 13, lineHeight: 1 }}>✓</span>}
                </div>
              </div>

              {isExpanded && (
                <div style={{ borderTop: `1px solid #2A2A32`, padding: "16px", display: "flex", gap: 16, alignItems: "flex-start" }}>
                  <div style={{
                    width: 110,
                    height: 90,
                    flexShrink: 0,
                    background: `${day.color}10`,
                    borderRadius: 10,
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    padding: 4,
                  }}>
                    {ex.svg}
                  </div>

                  <div>
                    <div style={{ fontSize: 10, color: day.color, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 6 }}>
                      Form tip
                    </div>
                    <div style={{ fontSize: 12, color: "#AAA", lineHeight: 1.6 }}>
                      {ex.tip}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ margin: "20px 20px 0" }}>
        <button
          onClick={() => setShowPullUp(!showPullUp)}
          style={{
            width: "100%",
            background: "#1A1A20",
            border: "1.5px solid #F472B630",
            borderRadius: 12,
            padding: "14px 16px",
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            color: "#F1F0EE",
          }}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 18 }}>🎯</span>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#F472B6" }}>Pull Up Goal Tracker</div>
              <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>
                {pullUpStagesDone.filter(Boolean).length}/4 stages complete
              </div>
            </div>
          </div>
          <div style={{ color: "#444", fontSize: 16, transition: "transform 0.2s", transform: showPullUp ? "rotate(90deg)" : "rotate(0deg)" }}>›</div>
        </button>

        {showPullUp && (
          <div style={{ background: "#1A1A20", border: "1.5px solid #2A2A32", borderTop: "none", borderRadius: "0 0 12px 12px", padding: "4px 16px 16px" }}>
            <div style={{ fontSize: 11, color: "#555", marginBottom: 12, lineHeight: 1.6 }}>
              Tap each stage as you reach it. First pull up typically in 8–12 weeks.
            </div>
            {pullUpStages.map((stage, i) => {
              const done = pullUpStagesDone[i];
              return (
                <div
                  key={i}
                  onClick={() => {
                    const updated = [...pullUpStagesDone];
                    updated[i] = !updated[i];
                    setPullUpStagesDone(updated);
                  }}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    padding: "10px 0",
                    borderBottom: i < pullUpStages.length - 1 ? "1px solid #2A2A32" : "none",
                    cursor: "pointer",
                    opacity: done ? 0.5 : 1,
                  }}
                >
                  <div style={{
                    width: 22,
                    height: 22,
                    borderRadius: "50%",
                    border: `2px solid ${done ? "#F472B6" : "#3A3A42"}`,
                    background: done ? "#F472B6" : "transparent",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    flexShrink: 0,
                    fontSize: 11,
                    color: "#fff",
                  }}>
                    {done ? "✓" : ""}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: done ? "#555" : "#F1F0EE" }}>
                      {stage.label}
                      {i === 3 && !done && <span style={{ marginLeft: 6, fontSize: 11 }}>🏆</span>}
                    </div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 1 }}>{stage.week} · {stage.desc}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{
        margin: "20px 20px 0",
        background: "#1A1A20",
        borderRadius: 12,
        padding: "14px 16px",
        border: "1px solid #2A2A32",
      }}>
        <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6 }}>
          How to use this split
        </div>
        <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7 }}>
          <span style={{ color: workouts.A.color }}>Day A (Lower)</span> → rest →{" "}
          <span style={{ color: workouts.B.color }}>Day B (Upper)</span> → rest →{" "}
          <span style={{ color: workouts.C.color }}>Day C (Full Body)</span><br />
          On 2× weeks, alternate A and B. Skating days count as active recovery.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WorkoutPlan />);
  </script>
</body>
</html>
